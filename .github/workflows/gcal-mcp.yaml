name: gcal-mcp

on:
  push:
    branches: [main]
    paths:
      - k8s/openclaw/mcp-servers/google-calendar/**
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/gcal-mcp

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: k8s/openclaw/mcp-servers/google-calendar
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
