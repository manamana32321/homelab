name: health-hub-image

on:
  push:
    branches: [main]
    paths:
      - health-hub/**
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/health-hub

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: health-hub/go.sum
      - name: Run tests
        working-directory: health-hub
        run: go test ./... -v -count=1

  build-push:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: health-hub
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
