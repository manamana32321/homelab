---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gbrain-mcp
  namespace: gbrain
  labels:
    app: gbrain-mcp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gbrain-mcp
  template:
    metadata:
      labels:
        app: gbrain-mcp
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # Clone brain repo (private) into shared volume
        - name: git-clone
          image: alpine/git:latest
          command:
            - sh
            - -c
            - |
              set -e
              if [ -d /brain/.git ]; then
                cd /brain && git pull --ff-only
              else
                rm -rf /brain/* /brain/.[!.]* 2>/dev/null || true
                git clone --depth 1 \
                  "https://x-access-token:${GH_PAT}@github.com/manamana32321/brain.git" \
                  /brain
              fi
          env:
            - name: GH_PAT
              valueFrom:
                secretKeyRef:
                  name: gbrain-github-credentials
                  key: GH_PAT
            # alpine/git as UID 1000 has no real $HOME; redirect to writable /tmp.
            - name: HOME
              value: /tmp
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: brain
              mountPath: /brain
            - name: git-tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

      containers:
        # Main: gbrain stdio MCP wrapped via mcp-proxy → SSE :8080
        - name: gbrain-mcp
          image: ghcr.io/manamana32321/gbrain-mcp:latest
          imagePullPolicy: Always
          workingDir: /brain
          env:
            # gbrain reads GBRAIN_DATABASE_URL (or DATABASE_URL) per core/config.ts loadConfig.
            # Stored as full URL in SealedSecret to avoid $(VAR) interpolation issues.
            - name: GBRAIN_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: gbrain-postgres-secrets
                  key: GBRAIN_DATABASE_URL
            # OPENAI_API_KEY: Reflected from shared-secrets/llm-api-keys
            # (single SOT for cross-domain LLM keys, per k8s/CLAUDE.md).
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-api-keys
                  key: OPENAI_API_KEY
            # Disable .pyc generation so mcp-proxy doesn't try to write
            # __pycache__ into the read-only image layer.
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: PYTHONUNBUFFERED
              value: "1"
          ports:
            - containerPort: 8080
              name: sse
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: brain
              mountPath: /brain
            - name: gbrain-tmp
              mountPath: /tmp
            - name: bun-cache
              mountPath: /home/bun/.bun
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 1Gi
              cpu: 1000m

        # Sidecar: caddy reverse proxy with Bearer auth (listens on :8080
        # so it can run as non-root without NET_BIND_SERVICE).
        - name: caddy
          image: caddy:2-alpine
          command: ["caddy", "run", "--config", "/etc/caddy/Caddyfile"]
          env:
            - name: MCP_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gbrain-postgres-secrets
                  key: MCP_AUTH_TOKEN
            # Caddy expects writable XDG dirs; redirect into mounted tmpfs.
            - name: XDG_DATA_HOME
              value: /tmp/caddy-data
            - name: XDG_CONFIG_HOME
              value: /tmp/caddy-config
          ports:
            - containerPort: 8081
              name: http
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: caddy-config
              mountPath: /etc/caddy
            - name: caddy-tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi

      volumes:
        - name: brain
          emptyDir: {}
        - name: caddy-config
          configMap:
            name: gbrain-mcp-caddy
        # Writable tmpfs-style emptyDir per container (RO root fs).
        - name: git-tmp
          emptyDir: {}
        - name: gbrain-tmp
          emptyDir: {}
        - name: bun-cache
          emptyDir: {}
        - name: caddy-tmp
          emptyDir: {}
