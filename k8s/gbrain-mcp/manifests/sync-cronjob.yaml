---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: gbrain-sync
  namespace: gbrain
spec:
  schedule: "*/5 * * * *"          # every 5 minutes
  successfulJobsHistoryLimit: 1
  # 0: 실패 잡 오브젝트를 남기지 않는다. kube-prometheus-stack의 KubeJobFailed는
  # kube_job_failed>0 (= 실패 잡 오브젝트 존재)로 발화하는데, 5분 cron의 일시적
  # 실패가 남긴 잡이 새 실패로 rotate되거나 수동 삭제될 때까지 알림이 안 꺼져 nuisance가 된다.
  # 지속 장애 감지는 alert-rules.yaml의 GbrainSyncStale(last_successful_time 신선도)이 담당.
  failedJobsHistoryLimit: 0
  concurrencyPolicy: Forbid         # never overlap
  startingDeadlineSeconds: 300      # skip schedule if not started within 5m (prevents stuck-job cascade)
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1800   # kill job after 30m (normal sync finishes in ~17m)
      template:
        spec:
          restartPolicy: OnFailure
          nodeSelector:
            kubernetes.io/arch: amd64   # image is amd64-only; raspi-1 (arm64) would ImagePullBackOff
          containers:
            - name: sync
              image: ghcr.io/manamana32321/gbrain-mcp:latest
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eo pipefail
                  rm -rf /tmp/brain
                  git clone --depth 1 \
                    "https://x-access-token:${GH_PAT}@github.com/manamana32321/brain.git" \
                    /tmp/brain
                  gbrain sync --repo /tmp/brain
              env:
                - name: GH_PAT
                  valueFrom:
                    secretKeyRef:
                      name: gbrain-github-credentials
                      key: GH_PAT
                # Full URL stored in SealedSecret (no $(VAR) interpolation)
                - name: GBRAIN_DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: gbrain-postgres-secrets
                      key: GBRAIN_DATABASE_URL
                # OPENAI_API_KEY: Reflected from shared-secrets/llm-api-keys.
                - name: OPENAI_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: llm-api-keys
                      key: OPENAI_API_KEY
              resources:
                requests:
                  memory: 256Mi
                  cpu: 100m
                limits:
                  memory: 512Mi
                  cpu: 500m
