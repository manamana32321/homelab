---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: gbrain-sync
  namespace: gbrain
spec:
  schedule: "*/5 * * * *"          # every 5 minutes
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid         # never overlap
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: sync
              image: ghcr.io/manamana32321/gbrain-mcp:latest
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eo pipefail
                  rm -rf /tmp/brain
                  git clone --depth 1 \
                    "https://x-access-token:${GH_PAT}@github.com/manamana32321/brain.git" \
                    /tmp/brain
                  gbrain sync --repo /tmp/brain
              env:
                - name: GH_PAT
                  valueFrom:
                    secretKeyRef:
                      name: gbrain-github-credentials
                      key: GH_PAT
                # Full URL stored in SealedSecret (no $(VAR) interpolation)
                - name: GBRAIN_DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: gbrain-postgres-secrets
                      key: GBRAIN_DATABASE_URL
                # OPENAI_API_KEY: reflected from automation/brain-agent-tokens
                # (single SOT for LLM keys, per k8s/CLAUDE.md).
                - name: OPENAI_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: brain-agent-tokens
                      key: OPENAI_API_KEY
              resources:
                requests:
                  memory: 256Mi
                  cpu: 100m
                limits:
                  memory: 512Mi
                  cpu: 500m
