apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - sealed-secret.yaml

configMapGenerator:
  - name: hermes-config
    files:
      - config.yaml

generatorOptions:
  # Stable name so deployment can reference `hermes-config`.
  # Change config.yaml → manual rollout restart required.
  disableNameSuffixHash: true
