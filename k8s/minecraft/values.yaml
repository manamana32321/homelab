replicaCount: 1

image:
  repository: itzg/minecraft-server
  tag: latest
  pullPolicy: IfNotPresent

resources:
  requests:
    memory: 1Gi
    cpu: "500m"
  limits:
    memory: 2Gi
    cpu: "1000m"

persistence:
  dataDir:
    enabled: true
    size: 5Gi

minecraftServer:
  eula: "TRUE"
  type: "PAPER"
  version: "26.1.2"
  memory: "1G"
  difficulty: "normal"
  gameMode: "survival"
  maxPlayers: 20
  pvp: true
  motd: "JSON Homelab Minecraft Server"
  onlineMode: true
  # k3s ServiceLB(klipper)가 노드 호스트의 25565를 직접 바인딩 → 공유기 포트포워딩 1:1
  serviceType: LoadBalancer
  servicePort: 25565

strategyType: Recreate

livenessProbe:
  initialDelaySeconds: 120
  periodSeconds: 60

readinessProbe:
  initialDelaySeconds: 60
  periodSeconds: 15
