replicaCount: 1

image:
  repository: itzg/minecraft-server
  tag: latest
  pullPolicy: IfNotPresent

resources:
  requests:
    memory: 1Gi
    cpu: "500m"
  limits:
    memory: 2Gi
    cpu: "1000m"

persistence:
  dataDir:
    enabled: true
    size: 5Gi

minecraftServer:
  eula: "TRUE"
  type: "PAPER"
  version: "1.21.11"
  memory: "1G"
  difficulty: "normal"
  gameMode: "survival"
  maxPlayers: 20
  pvp: true
  motd: "JSON Homelab Minecraft Server"
  onlineMode: true
  # нҷ”мқҙнҠёлҰ¬мҠӨнҠё вҖ” л“ұлЎқлҗң м№ңкө¬л§Ң м ‘мҶҚ (к·ёлҰ¬нҚј м°ЁлӢЁ). WHITELIST env вҶ’ whitelist.json лҸҷкё°нҷ”.
  # м№ңкө¬ м¶”к°Җ мӢң мқҙ мӨ„м—җ мүјн‘ңлЎң лӢүл„Өмһ„ м¶”к°Җ нӣ„ PR. gitмқҙ SSOT.
  whitelist: "EddieDawn,Dinudi,JinuStar0"
  # k3s ServiceLB(klipper)к°Җ л…ёл“ң нҳёмҠӨнҠёмқҳ 25565лҘј м§Ғм ‘ л°”мқёл”© вҶ’ кіөмң кё° нҸ¬нҠёнҸ¬мӣҢл”© 1:1
  serviceType: LoadBalancer
  servicePort: 25565
  # RCON вҖ” mc-backup мӮ¬мқҙл“ңм№ҙк°Җ save-off/save-on лӘ…л №мҡ©мңјлЎң н•„мҡ”.
  # м°ЁнҠё deployment.yamlмқҳ мӮ¬мқҙл“ңм№ҙ мЎ°кұҙмқҙ `mcbackup.enabled AND rcon.enabled`лқј
  # rconмқҙ кәјм ё мһҲмңјл©ҙ мӮ¬мқҙл“ңм№ҙк°Җ нҶөм§ёлЎң л ҢлҚ”л§Ғ м•Ҳ лҗЁ.
  # м„ңл№„мҠӨлҠ” ClusterIP кё°ліёк°’ мң м§Җ (мҷёл¶Җ л…ём¶ң кёҲм§Җ).
  rcon:
    enabled: true
    existingSecret: minecraft-rcon-credentials
    # secretKey кё°ліёк°’ "rcon-password" к·ёлҢҖлЎң мӮ¬мҡ©
  # н”Ңлҹ¬к·ёмқё лӘ©лЎқ вҖ” itzgк°Җ м»Ён…Ңмқҙл„Ҳ кё°лҸҷ мӢң jar лӢӨмҡҙлЎңл“ң нӣ„ /data/plugins/ м—җ л°°м№ҳ.
  # к°Ғ н”Ңлҹ¬к·ёмқёмқҳ configлҠ” лі„лҸ„ ConfigMap вҶ’ extraVolumes subPath л§ҲмҡҙнҠё (м•„лһҳ).
  pluginUrls:
    # sladkoff minecraft-prometheus-exporter (#206 лӘЁлӢҲн„°л§Ғ) вҖ” port 9940 /metrics
    - https://github.com/sladkoff/minecraft-prometheus-exporter/releases/download/v3.1.2/minecraft-prometheus-exporter-3.1.2.jar
    # DiscordSRV (#209 Discord м–‘л°©н–Ҙ мұ„нҢ… лӢӨлҰ¬)
    - https://github.com/DiscordSRV/DiscordSRV/releases/download/v1.30.5/DiscordSRV-Build-1.30.5.jar
    # BlueMap (#208 мӣ№л§ө 3D viewer) вҖ” v5.18 = 1.21.x нҳёнҷҳ л§Ҳм§Җл§ү (v5.19+лҠ” api-version 26.1.1 мҡ”кө¬)
    - https://github.com/BlueMap-Minecraft/BlueMap/releases/download/v5.18/bluemap-5.18-paper.jar

strategyType: Recreate

# нҷ”мқҙнҠёлҰ¬мҠӨнҠё enforcement лӘ…мӢң вҖ” м°ЁнҠёлҠ” minecraftServer.whitelist(лӘ©лЎқ)л§Ң л…ём¶ңн•ҳлҜҖлЎң
# server.properties н”Ңлһҳк·ёлҠ” extraEnv лЎң м§Ғм ‘ м„ м–ё. itzg к°Җ Pod мһ¬кё°лҸҷ мӢң мһ¬мғқм„ұн•ҙлҸ„ ліҙмһҘ.
#   ENABLE_WHITELIST  вҶ’ white-list=true
#   ENFORCE_WHITELIST вҶ’ enforce-whitelist=true (л№„нҷ”мқҙнҠёлҰ¬мҠӨнҠё м ‘мҶҚмһҗ мҰүмӢң к°•нҮҙ)
extraEnv:
  ENABLE_WHITELIST: "true"
  ENFORCE_WHITELIST: "true"

# н”Ңлҹ¬к·ёмқё config.yml к°•м ң мЈјмһ… вҖ” Bukkit copyDefaults к°Җ mounted file мқ„ мҡ°м„  мӮ¬мҡ©.
extraVolumes:
  # sladkoff exporter v3.1.2 вҖ” env var override лҜём§Җмӣҗ (мҶҢмҠӨ нҷ•мқё, master HEAD л§Ң м§Җмӣҗ). config.yml л§ҲмҡҙнҠёлЎң host=0.0.0.0 к°•м ң.
  - volumeMounts:
      - name: prometheus-exporter-config
        mountPath: /data/plugins/PrometheusExporter/config.yml
        subPath: config.yml
    volumes:
      - name: prometheus-exporter-config
        configMap:
          name: minecraft-prometheus-exporter-config
  # DiscordSRV v1.30.5 config вҖ”
  # subPath л§ҲмҡҙнҠёлҠ” л¶ҖлӘЁ dir мқ„ root мҶҢмң лЎң л§Ңл“Өм–ҙ plugin мқҙ messages.yml/linking.yml л“ұ лӢӨлҘё нҢҢмқј мһ‘м„ұ мӢң EACCES
  # вҶ’ ConfigMap мқҖ staging кІҪлЎң(/etc/configmap/discordsrv)м—җ read-only directory mount,
  #   initContainer к°Җ PVC мқҳ /data/plugins/DiscordSRV/config.yml лЎң ліөмӮ¬ (м•„лһҳ initContainers).
  - volumeMounts:
      - name: discordsrv-config-staging
        mountPath: /etc/configmap/discordsrv
        readOnly: true
    volumes:
      - name: discordsrv-config-staging
        configMap:
          name: minecraft-discordsrv-config
  # BlueMap v5.18 config вҖ” лҸҷмқј staging+initContainer нҢЁн„ҙ.
  # plugin мқҙ maps/, web/, data/ л“ұ лӢӨмӨ‘ л””л үнҶ лҰ¬В·нҢҢмқјмқ„ plugin dirм—җ мһ‘м„ұн•ҳлҜҖлЎң subPath л§ҲмҡҙнҠё л¶Ҳк°Җ.
  - volumeMounts:
      - name: bluemap-config-staging
        mountPath: /etc/configmap/bluemap
        readOnly: true
    volumes:
      - name: bluemap-config-staging
        configMap:
          name: minecraft-bluemap-config

# л©ҖнӢ°нҢҢмқј plugin л””л үнҶ лҰ¬лҠ” subPath л§ҲмҡҙнҠёк°Җ л¶ҖлӘЁ dir мқ„ root мҶҢмң лЎң мһ кёҲ вҶ’ EACCES.
# initContainer к°Җ uid 1000 (itzg кё°ліё мӮ¬мҡ©мһҗ) мңјлЎң plugin dir мқ„ лҜёлҰ¬ л§Ңл“Өкі  config ліөмӮ¬ вҶ’ л©”мқё м»Ён…Ңмқҙл„Ҳк°Җ нҸүлІ”н•ң dirлЎң мқёмӢқ.
initContainers:
  - name: discordsrv-config-seed
    image: busybox:1.36
    securityContext:
      runAsUser: 1000
      runAsGroup: 2000
    command:
      - sh
      - -c
      - |
        set -eux
        mkdir -p /data/plugins/DiscordSRV
        cp /etc/configmap/discordsrv/config.yml /data/plugins/DiscordSRV/config.yml
        # messages.yml: н•ңкөӯм–ҙ л©”мӢңм§Җ н…ңн”ҢлҰҝ (DiscordSRV upstream messages/ko.yml v1.30.5)
        cp /etc/configmap/discordsrv/messages.yml /data/plugins/DiscordSRV/messages.yml
    volumeMounts:
      - name: datadir
        mountPath: /data
      - name: discordsrv-config-staging
        mountPath: /etc/configmap/discordsrv
        readOnly: true
  - name: bluemap-config-seed
    image: busybox:1.36
    securityContext:
      runAsUser: 1000
      runAsGroup: 2000
    command:
      - sh
      - -c
      - |
        set -eux
        mkdir -p /data/plugins/BlueMap
        # core/webserver/plugin.conf вҖ” мҡ°лҰ¬ override л§Ң ліөмӮ¬. maps/*.conf лҠ” pluginмқҙ мІ« мӢӨн–ү мӢң мӣ”л“ң dimension лі„лЎң мһҗлҸҷ мғқм„ұ.
        cp /etc/configmap/bluemap/core.conf /data/plugins/BlueMap/core.conf
        cp /etc/configmap/bluemap/webserver.conf /data/plugins/BlueMap/webserver.conf
        cp /etc/configmap/bluemap/plugin.conf /data/plugins/BlueMap/plugin.conf
    volumeMounts:
      - name: datadir
        mountPath: /data
      - name: bluemap-config-staging
        mountPath: /etc/configmap/bluemap
        readOnly: true

# DiscordSRV к°Җ DISCORDSRV_TOKEN env var лҘј 1мҲңмң„лЎң мқҪмқҢ (мҶҢмҠӨ нҷ•мқё: v1.30.5 DiscordSRV.java).
# нҶ нҒ°мқҖ SealedSecret minecraft-discord-credentials м—җ лҙүмқёлҗҳм–ҙ мһҲкі  envFrom мңјлЎң л©”мқё м»Ён…Ңмқҙл„Ҳм—җ мЈјмһ….
envFrom:
  - secretRef:
      name: minecraft-discord-credentials

livenessProbe:
  initialDelaySeconds: 120
  periodSeconds: 60

readinessProbe:
  initialDelaySeconds: 60
  periodSeconds: 15

# мӣ”л“ң л°ұм—… мӮ¬мқҙл“ңм№ҙ вҖ” itzg/mc-backup, restic л°ұм—”л“ң вҶ’ S3
# м„Өкі„: docs/superpowers/specs/2026-05-14-minecraft-backup-design.md
# мӢңнҒ¬лҰҝ: k8s/minecraft/manifests/sealed-secret-mcbackup.yaml
mcbackup:
  enabled: true
  backupMethod: restic
  # кі м • н•„мҲҳ вҖ” pod мһ¬мғқм„ұл§ҲлӢӨ hostname л°”лҖҢл©ҙ restic pruneмқҙ мқҙм „ нҳёмҠӨнҠё мҠӨлғ…мғ·мқ„ лӘ» м •лҰ¬
  resticHostname: minecraft-homelab
  backupInterval: 24h
  # н”Ңл Ҳмқҙм–ҙ нҷңлҸҷ м—Ҷмңјл©ҙ мҠӨлғ…мғ· мғқлһө (л¶Ҳн•„мҡ”н•ң мҠӨлғ…мғ· лҲ„м Ғ л°©м§Җ)
  pauseIfNoPlayers: "true"
  # 1к°ңмӣ” нһҲмҠӨнҶ лҰ¬ вҖ” м№ңкө¬ м„ңлІ„ к·ңлӘЁм—җ м Ғм •
  pruneResticRetention: "--keep-daily 7 --keep-weekly 4"
  # SealedSecret minecraft-mcbackupм—җм„ң мЈјмһ…:
  # RESTIC_PASSWORD, RESTIC_REPOSITORY, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
  envFrom:
    - secretRef:
        name: minecraft-mcbackup
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m
