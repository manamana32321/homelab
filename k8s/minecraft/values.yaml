replicaCount: 1

image:
  repository: itzg/minecraft-server
  tag: latest
  pullPolicy: IfNotPresent

resources:
  requests:
    memory: 1Gi
    cpu: "500m"
  limits:
    memory: 2Gi
    cpu: "1000m"

persistence:
  dataDir:
    enabled: true
    size: 5Gi

minecraftServer:
  eula: "TRUE"
  type: "PAPER"
  version: "1.21.11"
  memory: "1G"
  difficulty: "normal"
  gameMode: "survival"
  maxPlayers: 20
  pvp: true
  motd: "JSON Homelab Minecraft Server"
  onlineMode: true
  # k3s ServiceLB(klipper)가 노드 호스트의 25565를 직접 바인딩 → 공유기 포트포워딩 1:1
  serviceType: LoadBalancer
  servicePort: 25565
  # RCON — mc-backup 사이드카가 save-off/save-on 명령용으로 필요.
  # 차트 deployment.yaml의 사이드카 조건이 `mcbackup.enabled AND rcon.enabled`라
  # rcon이 꺼져 있으면 사이드카가 통째로 렌더링 안 됨.
  # 서비스는 ClusterIP 기본값 유지 (외부 노출 금지).
  rcon:
    enabled: true
    existingSecret: minecraft-rcon-credentials
    # secretKey 기본값 "rcon-password" 그대로 사용
  # 플러그인 목록 — itzg가 컨테이너 기동 시 jar 다운로드 후 /data/plugins/ 에 배치.
  # 각 플러그인의 config는 별도 ConfigMap → extraVolumes subPath 마운트 (아래).
  pluginUrls:
    # sladkoff minecraft-prometheus-exporter (#206 모니터링) — port 9940 /metrics
    - https://github.com/sladkoff/minecraft-prometheus-exporter/releases/download/v3.1.2/minecraft-prometheus-exporter-3.1.2.jar
    # DiscordSRV (#209 Discord 양방향 채팅 다리)
    - https://github.com/DiscordSRV/DiscordSRV/releases/download/v1.30.5/DiscordSRV-Build-1.30.5.jar

strategyType: Recreate

# 플러그인 config.yml 강제 주입 — Bukkit copyDefaults 가 mounted file 을 우선 사용.
extraVolumes:
  # sladkoff exporter v3.1.2 — env var override 미지원 (소스 확인, master HEAD 만 지원). config.yml 마운트로 host=0.0.0.0 강제.
  - volumeMounts:
      - name: prometheus-exporter-config
        mountPath: /data/plugins/PrometheusExporter/config.yml
        subPath: config.yml
    volumes:
      - name: prometheus-exporter-config
        configMap:
          name: minecraft-prometheus-exporter-config
  # DiscordSRV v1.30.5 — 토큰은 env(DISCORDSRV_TOKEN)로, 채널/봇설정은 config.yml 로
  - volumeMounts:
      - name: discordsrv-config
        mountPath: /data/plugins/DiscordSRV/config.yml
        subPath: config.yml
    volumes:
      - name: discordsrv-config
        configMap:
          name: minecraft-discordsrv-config

# DiscordSRV 가 DISCORDSRV_TOKEN env var 를 1순위로 읽음 (소스 확인: v1.30.5 DiscordSRV.java).
# 토큰은 SealedSecret minecraft-discord-credentials 에 봉인되어 있고 envFrom 으로 메인 컨테이너에 주입.
envFrom:
  - secretRef:
      name: minecraft-discord-credentials

livenessProbe:
  initialDelaySeconds: 120
  periodSeconds: 60

readinessProbe:
  initialDelaySeconds: 60
  periodSeconds: 15

# 월드 백업 사이드카 — itzg/mc-backup, restic 백엔드 → S3
# 설계: docs/superpowers/specs/2026-05-14-minecraft-backup-design.md
# 시크릿: k8s/minecraft/manifests/sealed-secret-mcbackup.yaml
mcbackup:
  enabled: true
  backupMethod: restic
  # 고정 필수 — pod 재생성마다 hostname 바뀌면 restic prune이 이전 호스트 스냅샷을 못 정리
  resticHostname: minecraft-homelab
  backupInterval: 24h
  # 플레이어 활동 없으면 스냅샷 생략 (불필요한 스냅샷 누적 방지)
  pauseIfNoPlayers: "true"
  # 1개월 히스토리 — 친구 서버 규모에 적정
  pruneResticRetention: "--keep-daily 7 --keep-weekly 4"
  # SealedSecret minecraft-mcbackup에서 주입:
  # RESTIC_PASSWORD, RESTIC_REPOSITORY, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
  envFrom:
    - secretRef:
        name: minecraft-mcbackup
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m
