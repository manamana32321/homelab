# 2026-07-21 일시정지 — 최근 접속 없어 json-server-2 메모리를 CI 러너에 양보 (#261).
# 월드는 longhorn PVC 에 보존. 재개 시 1 로 복원.
replicaCount: 0

image:
  repository: itzg/minecraft-server
  tag: latest
  pullPolicy: IfNotPresent

# json-server-2(i5-8400 6C/6T, 메모리 여유)로 이전하며 리소스 증설.
# 기존 limit 1코어가 CPU throttle 93.7% 유발 → 청크 로딩 지연. node-2는 한가하고 코어 많아 넉넉히 허용.
resources:
  requests:
    memory: 3Gi
    cpu: "1000m"
  limits:
    memory: 4Gi
    cpu: "4000m"

# 월드 PVC(local-path)가 node-1에 묶여있어 nodeSelector + PVC 마이그레이션 필요.
# node-2: i5-8400 (마크는 싱글스레드 의존적 → 신세대 i5가 i7-3770보다 유리) + 메모리 여유.
nodeSelector:
  kubernetes.io/hostname: json-server-2

persistence:
  # storageClass는 values에 핀하지 않음 — itzg 차트 5.0.0은 storageClass를
  # 레거시 annotation(volume.beta.kubernetes.io/storage-class)으로 렌더하는데,
  # 이 annotation은 기존 PVC에서 immutable이라 ArgoCD sync가 통째로 거부됨
  # (#230에서 핀 시도 → PVC 패치 전체 실패로 Size 확장까지 막힘).
  # 현 PVC는 이미 longhorn-ssd(spec.storageClassName, immutable) — 핀 불필요.
  # 향후 PVC 재생성 시 결정성은 클러스터 default SC 단일화로 해결.
  dataDir:
    enabled: true
    # itzg 차트 키는 대문자 Size — 소문자 size는 무시되어 차트 기본값 1Gi로 떨어짐 (#229까지 1Gi였던 원인).
    # longhorn-ssd는 allowVolumeExpansion=true → 기존 PVC가 1Gi→5Gi 온라인 확장됨.
    Size: 5Gi

minecraftServer:
  eula: "TRUE"
  type: "PAPER"
  version: "1.21.11"
  # JVM 힙 — node-2 메모리 여유 활용. Paper 1.21 + 플러그인 8종 + BlueMap에 1G는 GC 압박.
  memory: "3G"
  difficulty: "normal"
  gameMode: "survival"
  maxPlayers: 20
  pvp: true
  motd: "JSON Homelab Minecraft Server"
  onlineMode: true
  # 화이트리스트 — 등록된 친구만 접속 (그리퍼 차단). WHITELIST env → whitelist.json 동기화.
  # 친구 추가 시 이 줄에 쉼표로 닉네임 추가 후 PR. git이 SSOT.
  whitelist: "EddieDawn,Dinudi,JinuStar0,SEOM"
  # k3s ServiceLB(klipper)가 노드 호스트의 25565를 직접 바인딩 → 공유기 포트포워딩 1:1
  serviceType: LoadBalancer
  servicePort: 25565
  # RCON — mc-backup 사이드카가 save-off/save-on 명령용으로 필요.
  # 차트 deployment.yaml의 사이드카 조건이 `mcbackup.enabled AND rcon.enabled`라
  # rcon이 꺼져 있으면 사이드카가 통째로 렌더링 안 됨.
  # 서비스는 ClusterIP 기본값 유지 (외부 노출 금지).
  rcon:
    enabled: true
    existingSecret: minecraft-rcon-credentials
    # secretKey 기본값 "rcon-password" 그대로 사용
  # 플러그인 목록 — itzg가 컨테이너 기동 시 jar 다운로드 후 /data/plugins/ 에 배치.
  # 각 플러그인의 config는 별도 ConfigMap → extraVolumes subPath 마운트 (아래).
  pluginUrls:
    # sladkoff minecraft-prometheus-exporter (#206 모니터링) — port 9940 /metrics
    - https://github.com/sladkoff/minecraft-prometheus-exporter/releases/download/v3.1.2/minecraft-prometheus-exporter-3.1.2.jar
    # DiscordSRV (#209 Discord 양방향 채팅 다리)
    - https://github.com/DiscordSRV/DiscordSRV/releases/download/v1.30.5/DiscordSRV-Build-1.30.5.jar
    # BlueMap (#208 웹맵 3D viewer) — v5.18 = 1.21.x 호환 마지막 (v5.19+는 api-version 26.1.1 요구)
    - https://github.com/BlueMap-Minecraft/BlueMap/releases/download/v5.18/bluemap-5.18-paper.jar
    # EssentialsX (#207 QoL — /tpa /home /sethome /back) — api-version 1.13, 1.21.x 광범위 호환.
    # Modrinth 메타데이터가 1.21.11 미표기(릴리스가 먼저 나옴)라 GitHub 릴리스 jar 직접 사용.
    - https://github.com/EssentialsX/Essentials/releases/download/2.21.2/EssentialsX-2.21.2.jar
  # Modrinth 배포 플러그인 (#207) — slug:version 핀. itzg가 Modrinth API로 해석.
  modrinth:
    projects:
      # CoreProtect (그리핑 블록단위 추적/롤백) — Community Edition free 빌드
      - coreprotect:23.2
      # WorldEdit — WorldGuard 하드 의존성 (먼저 명시 핀하여 reproducible, downloadDependencies 미사용)
      - worldedit:7.4.3
      # WorldGuard (지역 보호 — 스폰/공동 건축물 2차 방어선)
      - worldguard:7.0.16
    # WorldEdit를 명시 핀했으므로 의존성 자동 다운로드 불필요 (기본값 유지)
    downloadDependencies: none

strategyType: Recreate

# 화이트리스트 enforcement 명시 — 차트는 minecraftServer.whitelist(목록)만 노출하므로
# server.properties 플래그는 extraEnv 로 직접 선언. itzg 가 Pod 재기동 시 재생성해도 보장.
#   ENABLE_WHITELIST  → white-list=true
#   ENFORCE_WHITELIST → enforce-whitelist=true (비화이트리스트 접속자 즉시 강퇴)
extraEnv:
  ENABLE_WHITELIST: "true"
  ENFORCE_WHITELIST: "true"

# 플러그인 config.yml 강제 주입 — Bukkit copyDefaults 가 mounted file 을 우선 사용.
extraVolumes:
  # sladkoff exporter v3.1.2 — env var override 미지원 (소스 확인, master HEAD 만 지원). config.yml 마운트로 host=0.0.0.0 강제.
  - volumeMounts:
      - name: prometheus-exporter-config
        mountPath: /data/plugins/PrometheusExporter/config.yml
        subPath: config.yml
    volumes:
      - name: prometheus-exporter-config
        configMap:
          name: minecraft-prometheus-exporter-config
  # DiscordSRV v1.30.5 config —
  # subPath 마운트는 부모 dir 을 root 소유로 만들어 plugin 이 messages.yml/linking.yml 등 다른 파일 작성 시 EACCES
  # → ConfigMap 은 staging 경로(/etc/configmap/discordsrv)에 read-only directory mount,
  #   initContainer 가 PVC 의 /data/plugins/DiscordSRV/config.yml 로 복사 (아래 initContainers).
  - volumeMounts:
      - name: discordsrv-config-staging
        mountPath: /etc/configmap/discordsrv
        readOnly: true
    volumes:
      - name: discordsrv-config-staging
        configMap:
          name: minecraft-discordsrv-config
  # BlueMap v5.18 config — 동일 staging+initContainer 패턴.
  # plugin 이 maps/, web/, data/ 등 다중 디렉토리·파일을 plugin dir에 작성하므로 subPath 마운트 불가.
  - volumeMounts:
      - name: bluemap-config-staging
        mountPath: /etc/configmap/bluemap
        readOnly: true
    volumes:
      - name: bluemap-config-staging
        configMap:
          name: minecraft-bluemap-config

# 멀티파일 plugin 디렉토리는 subPath 마운트가 부모 dir 을 root 소유로 잠금 → EACCES.
# initContainer 가 uid 1000 (itzg 기본 사용자) 으로 plugin dir 을 미리 만들고 config 복사 → 메인 컨테이너가 평범한 dir로 인식.
initContainers:
  - name: discordsrv-config-seed
    image: busybox:1.36
    securityContext:
      runAsUser: 1000
      runAsGroup: 2000
    command:
      - sh
      - -c
      - |
        set -eux
        mkdir -p /data/plugins/DiscordSRV
        cp /etc/configmap/discordsrv/config.yml /data/plugins/DiscordSRV/config.yml
        # messages.yml: 한국어 메시지 템플릿 (DiscordSRV upstream messages/ko.yml v1.30.5)
        cp /etc/configmap/discordsrv/messages.yml /data/plugins/DiscordSRV/messages.yml
    volumeMounts:
      - name: datadir
        mountPath: /data
      - name: discordsrv-config-staging
        mountPath: /etc/configmap/discordsrv
        readOnly: true
  - name: bluemap-config-seed
    image: busybox:1.36
    securityContext:
      runAsUser: 1000
      runAsGroup: 2000
    command:
      - sh
      - -c
      - |
        set -eux
        mkdir -p /data/plugins/BlueMap
        # core/webserver/plugin.conf — 우리 override 만 복사. maps/*.conf 는 plugin이 첫 실행 시 월드 dimension 별로 자동 생성.
        cp /etc/configmap/bluemap/core.conf /data/plugins/BlueMap/core.conf
        cp /etc/configmap/bluemap/webserver.conf /data/plugins/BlueMap/webserver.conf
        cp /etc/configmap/bluemap/plugin.conf /data/plugins/BlueMap/plugin.conf
    volumeMounts:
      - name: datadir
        mountPath: /data
      - name: bluemap-config-staging
        mountPath: /etc/configmap/bluemap
        readOnly: true

# DiscordSRV 가 DISCORDSRV_TOKEN env var 를 1순위로 읽음 (소스 확인: v1.30.5 DiscordSRV.java).
# 토큰은 SealedSecret minecraft-discord-credentials 에 봉인되어 있고 envFrom 으로 메인 컨테이너에 주입.
envFrom:
  - secretRef:
      name: minecraft-discord-credentials

livenessProbe:
  initialDelaySeconds: 120
  periodSeconds: 60

readinessProbe:
  initialDelaySeconds: 60
  periodSeconds: 15

# 월드 백업 사이드카 — itzg/mc-backup, restic 백엔드 → S3
# 설계: docs/superpowers/specs/2026-05-14-minecraft-backup-design.md
# 시크릿: k8s/minecraft/manifests/sealed-secret-mcbackup.yaml
mcbackup:
  enabled: true
  backupMethod: restic
  # 고정 필수 — pod 재생성마다 hostname 바뀌면 restic prune이 이전 호스트 스냅샷을 못 정리
  resticHostname: minecraft-homelab
  backupInterval: 24h
  # 플레이어 활동 없으면 스냅샷 생략 (불필요한 스냅샷 누적 방지)
  pauseIfNoPlayers: "true"
  # 1개월 히스토리 — 친구 서버 규모에 적정
  pruneResticRetention: "--keep-daily 7 --keep-weekly 4"
  # SealedSecret minecraft-mcbackup에서 주입:
  # RESTIC_PASSWORD, RESTIC_REPOSITORY, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
  envFrom:
    - secretRef:
        name: minecraft-mcbackup
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m
