apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: opencampus
resources:
  - ../../base
  - sealed-secret.yaml
  - ingress.yaml
  - ingress-console.yaml
patches:
  - target:
      group: minio.min.io
      version: v2
      kind: Tenant
      name: minio
    patch: |
      - op: replace
        path: /spec/pools/0/volumeClaimTemplate/spec/storageClassName
        value: longhorn-ssd
