apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-image-updater
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argocd-image-updater
    targetRevision: 0.12.0
    helm:
      releaseName: argocd-image-updater
      values: |
        config:
          registries:
            - name: GitHub Container Registry
              prefix: ghcr.io
              api_url: https://ghcr.io
              default: true
        # silent CD failure 감지를 위한 메트릭 노출 (port 8081).
        # 알림 룰은 후속 PR에서 추가 예정.
        metrics:
          enabled: true
          serviceMonitor:
            enabled: true
            additionalLabels:
              release: prometheus
        # 추가 ClusterRole/RoleBinding으로 secrets 권한 부여하는 건
        # 별도 Application argocd-image-updater-rbac (k8s/argocd-image-updater-rbac/)
        # 에서 관리. 이 chart는 extraObjects/extraDeploy를 지원하지 않음.
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true