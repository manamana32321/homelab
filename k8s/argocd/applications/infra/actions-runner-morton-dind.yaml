apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: actions-runner-morton-dind
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    # Source 1: Runner Scale Set Helm chart (dind 셋)
    - repoURL: ghcr.io/actions/actions-runner-controller-charts
      chart: gha-runner-scale-set
      targetRevision: 0.13.1
      helm:
        releaseName: morton-runner-dind
        valueFiles:
          - $homelab/k8s/actions-runner/runner-dind-values.yaml
    # Source 2: Homelab repo reference for values
    - repoURL: https://github.com/manamana32321/homelab
      targetRevision: main
      ref: homelab
    # SealedSecret(github-app-secret)은 actions-runner-morton 앱이 소유 — 공유 참조만.
  destination:
    server: https://kubernetes.default.svc
    namespace: actions-runner
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
