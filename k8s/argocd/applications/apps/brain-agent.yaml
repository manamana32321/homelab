apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: brain-agent
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: automation
spec:
  project: default
  source:
    repoURL: https://github.com/manamana32321/homelab.git
    targetRevision: main
    path: k8s/brain-agent
  destination:
    server: https://kubernetes.default.svc
    namespace: automation
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
