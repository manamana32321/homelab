apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: seafile
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/manamana32321/homelab
    targetRevision: main
    path: k8s/seafile/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: seafile
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
