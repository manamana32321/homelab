apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frigate
  namespace: argocd
spec:
  project: default
  sources:
    # Source 1: Frigate Helm chart
    - repoURL: https://blakeblackshear.github.io/blakeshome-charts
      chart: frigate
      targetRevision: "7.8.0"
      helm:
        valueFiles:
          - $homelab/k8s/frigate/values.yaml
    # Source 2: Homelab repo reference for values
    - repoURL: https://github.com/manamana32321/homelab
      targetRevision: main
      ref: homelab
    # Source 3: Raw manifests (go2rtc)
    - repoURL: https://github.com/manamana32321/homelab
      targetRevision: main
      path: k8s/frigate/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: frigate
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
