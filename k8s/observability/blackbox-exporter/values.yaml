## kube-prometheus-stack ServiceMonitor selector 매칭
releaseLabel: true

resources:
  requests:
    cpu: 50m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi

config:
  modules:
    http_2xx:
      prober: http
      timeout: 10s
      http:
        valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
        follow_redirects: true
        preferred_ip_protocol: ip4
        fail_if_not_ssl: true
    http_2xx_no_tls:
      prober: http
      timeout: 5s
      http:
        valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
        follow_redirects: true
        preferred_ip_protocol: ip4
    http_any_response:
      prober: http
      timeout: 10s
      http:
        valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
        valid_status_codes: [200, 301, 302, 400, 401, 403, 404]  # 응답 자체가 오면 서비스 정상
        follow_redirects: false
        preferred_ip_protocol: ip4
        fail_if_not_ssl: true
    tcp_connect:
      prober: tcp
      timeout: 5s
    icmp_ping:
      prober: icmp
      timeout: 5s

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
    add: ["NET_RAW"]

serviceMonitor:
  selfMonitor:
    enabled: true
    labels:
      release: prometheus

  enabled: true
  defaults:
    labels:
      release: prometheus
    interval: 60s
    scrapeTimeout: 30s
    module: http_2xx

  targets:
    # --- 내부 서비스 헬스체크 (ClusterIP, 서비스 자체 health) ---
    # 외부 경로 헬스체크는 coral이 담당 (독립 관측점)
    - name: argocd
      url: http://argocd-server.argocd.svc.cluster.local
      module: http_2xx_no_tls
    - name: grafana
      url: http://grafana.observability.svc.cluster.local/login
      module: http_2xx_no_tls
    - name: prometheus
      url: http://prometheus-kube-prometheus-prometheus.observability.svc.cluster.local:9090/-/ready
      module: http_2xx_no_tls
    - name: authentik
      url: http://authentik-server.authentik.svc.cluster.local/-/health/live/
      module: http_2xx_no_tls
    - name: immich
      url: http://immich-server.immich.svc.cluster.local:2283/api/server/ping
      module: http_2xx_no_tls
    - name: seafile
      url: http://seafile.seafile.svc.cluster.local
      module: http_2xx_no_tls
    - name: home-assistant
      url: http://home-assistant.home-assistant.svc.cluster.local:8080
      module: http_2xx_no_tls
    - name: openclaw
      url: http://openclaw.openclaw.svc.cluster.local:18789
      module: http_2xx_no_tls
    - name: k8s-dashboard
      url: http://headlamp.headlamp.svc.cluster.local
      module: http_2xx_no_tls
    - name: cloudbeaver
      url: http://cloudbeaver.cloudbeaver.svc.cluster.local:8978
      module: http_2xx_no_tls
    - name: amang-api
      url: http://api-server.amang-api-production.svc.cluster.local:8000/health
      module: http_2xx_no_tls
    - name: amang-api-staging
      url: http://api-server.amang-api-staging.svc.cluster.local:8000/health
      module: http_2xx_no_tls
    - name: loki
      url: http://loki.observability.svc.cluster.local:3100/ready
      module: http_2xx_no_tls
    - name: tempo
      url: http://tempo.observability.svc.cluster.local:3200/ready
      module: http_2xx_no_tls
    - name: mosquitto
      url: mosquitto.mosquitto.svc.cluster.local:1883
      module: tcp_connect
    - name: health-hub
      url: http://health-hub.health-hub.svc.cluster.local:8080/healthz
      module: http_2xx_no_tls
