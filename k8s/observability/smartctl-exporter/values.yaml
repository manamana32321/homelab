config:
  devices:
    - /dev/sdb
    - /dev/sdc

common:
  config:
    collect_not_more_than_period: 300s

nodeSelector:
  kubernetes.io/hostname: json-server-1

serviceMonitor:
  enabled: true
  extraLabels:
    release: prometheus
  interval: 5m
  scrapeTimeout: 30s

prometheusRules:
  enabled: true
  extraLabels:
    release: prometheus
  rules:
    # NVMe 전용 메트릭 — SATA HDD 환경에선 metric 자체가 없어 발화 불가
    smartCTLDeviceMediaErrors:
      enabled: false
    smartCTLDeviceCriticalWarning:
      enabled: false
    smartCTLDeviceAvailableSpareUnderThreshold:
      enabled: false
    # chart 버그: expr이 `smartctl_device_status`(미존재) 참조.
    # 실제 메트릭명은 `smartctl_device_smart_status` →
    # homelab-alerts의 DiskSmartFailed 룰로 대체
    smartCTLDeviceStatus:
      enabled: false
    smartCTLDInterfaceSlow:
      enabled: false
    smartCTLDDeviceTemperature:
      enabled: true
      expr: smartctl_device_temperature{temperature_type="current"} > 55

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 250m
    memory: 64Mi
