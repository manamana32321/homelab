apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: homelab-alerts
  namespace: observability
  labels:
    release: prometheus
spec:
  groups:
    # Blackbox Exporter 알림 (kube-prometheus-stack 기본에 없음)
    - name: blackbox
      rules:
        - alert: EndpointDown
          expr: probe_success{source!="coral"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "{{ $labels.instance }} is down"
            description: "{{ $labels.instance }} has been unreachable for 2 minutes (source: {{ $labels.job }})."

        - alert: TLSCertExpiringSoon
          expr: (probe_ssl_earliest_cert_expiry{source!="coral"} - time()) / 86400 < 14
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "TLS cert expiring: {{ $labels.instance }}"
            description: "Certificate for {{ $labels.instance }} expires in {{ $value | humanize }} days."

        - alert: SlowResponse
          expr: avg_over_time(probe_duration_seconds{source!="coral"}[5m]) > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Slow response: {{ $labels.instance }}"
            description: "{{ $labels.instance }} avg response time is {{ $value | humanize }}s over last 5 minutes."

    # 스토리지 알림 (kube-prometheus-stack 기본에 PVC/디스크 임계치 rule 없음)
    - name: storage
      rules:
        - alert: PVCAlmostFull
          expr: kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes > 0.80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PVC almost full: {{ $labels.persistentvolumeclaim }}"
            description: "PVC {{ $labels.persistentvolumeclaim }} in {{ $labels.namespace }} is {{ $value | humanizePercentage }} full."

        - alert: NodeDiskAlmostFull
          # SSD(`/`): 90% — Longhorn replica sparse 누적은 Trim Filesystem으로 회수 가능, 늦게 알려도 무방.
          expr: (1 - node_filesystem_avail_bytes{fstype=~"ext4|xfs",mountpoint!~"/mnt/hdd-.*"} / node_filesystem_size_bytes{fstype=~"ext4|xfs",mountpoint!~"/mnt/hdd-.*"}) > 0.9
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Disk almost full: {{ $labels.instance }} {{ $labels.mountpoint }}"
            description: "{{ $labels.mountpoint }} on {{ $labels.instance }} is {{ $value | humanizePercentage }} full."

        - alert: HDDAlmostFull
          # HDD(`/mnt/hdd-*`): 75% — 미디어 누적이라 회수 불가, 일찍 경고해 정리/확장 시간 확보.
          expr: (1 - node_filesystem_avail_bytes{fstype=~"ext4|xfs",mountpoint=~"/mnt/hdd-.*"} / node_filesystem_size_bytes{fstype=~"ext4|xfs",mountpoint=~"/mnt/hdd-.*"}) > 0.75
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "HDD almost full: {{ $labels.instance }} {{ $labels.mountpoint }}"
            description: "{{ $labels.mountpoint }} on {{ $labels.instance }} is {{ $value | humanizePercentage }} full."

    # SMART 디스크 건강 알림 (ATA HDD 특화 — NVMe 기본 알림은 smartctl-exporter chart에 내장)
    - name: smart
      rules:
        - alert: DiskPendingSectors
          # TODO(2026-12): sdc 디스크 교체 후 원복 — 기존: > 0
          # sdc는 pending 2개가 물리적으로 복구 불가 상태이므로 3개 이상만 알림
          expr: >-
            smartctl_device_attribute{attribute_name="Current_Pending_Sector", attribute_value_type="raw"} > 0
            unless
            (smartctl_device_attribute{attribute_name="Current_Pending_Sector", attribute_value_type="raw", device="sdc"} <= 2)
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pending sectors: {{ $labels.device }} ({{ $labels.instance }})"
            description: "{{ $labels.device }} has {{ $value }} pending sector(s). Potential disk failure."

        - alert: DiskReallocatedSectors
          expr: smartctl_device_attribute{attribute_name="Reallocated_Sector_Ct", attribute_value_type="raw"} > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Reallocated sectors: {{ $labels.device }} ({{ $labels.instance }})"
            description: "{{ $labels.device }} has {{ $value }} reallocated sector(s)."

        - alert: DiskReallocatedSectorsCritical
          expr: smartctl_device_attribute{attribute_name="Reallocated_Sector_Ct", attribute_value_type="raw"} > 100
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "CRITICAL: Many reallocated sectors on {{ $labels.device }}"
            description: "{{ $labels.device }} has {{ $value }} reallocated sectors. Replace disk."

        # SMART overall verdict — 벤더 normalized threshold가 깨질 때 발화.
        # reallocation 외의 실패 모드(spin-up 열화, read error rate, retry count 등)도
        # 잡아냄. 어떤 attribute가 원인인지는 smartctl -A로 별도 확인 필요.
        # smartctl-exporter chart의 smartCTLDeviceStatus 룰은 메트릭명 버그로
        # (smartctl_device_status, 미존재) 작동하지 않아 직접 정의함.
        - alert: DiskSmartFailed
          expr: smartctl_device_smart_status != 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "SMART overall FAILED: {{ $labels.device }} ({{ $labels.instance }})"
            description: "{{ $labels.device }} SMART overall-health 판정이 FAIL. 즉시 디스크 교체 준비. `smartctl -A /dev/{{ $labels.device }}`로 어떤 attribute가 threshold를 넘었는지 확인."

    # CrowdSec IPS 알림
    - name: crowdsec
      rules:
        - alert: CrowdSecHighBanRate
          # CAPI(커뮤니티 블록리스트) 제외 — 2시간마다 ~15K건 벌크 동기화로 false positive 발생
          expr: increase(cs_active_decisions{origin!="CAPI"}[5m]) > 50
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "CrowdSec: 다수 IP 차단 중 (로컬 탐지)"
            description: "5분간 {{ $value | humanize }}건의 로컬 차단 판단 발생."

        - alert: CrowdSecLAPIDown
          expr: up{job=~".*crowdsec-lapi.*"} == 0
          for: 3m
          labels:
            severity: critical
          annotations:
            summary: "CrowdSec LAPI 응답 없음"
            description: "CrowdSec LAPI가 3분간 메트릭을 노출하지 않음. bouncer가 fail-open 상태."

    # 리소스 알림 (kube-prometheus-stack 기본 NodeMemory rule은 예측 기반이라 직관적이지 않음)
    - name: resources
      rules:
        - alert: HighMemoryUsage
          expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 0.9
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High memory: {{ $labels.instance }}"
            description: "Memory usage on {{ $labels.instance }} is {{ $value | humanizePercentage }}."

    # Coral Dev Board (K3s 외부, standalone Docker). 외부 관측점이므로 다운 시 critical
    - name: coral
      rules:
        - alert: CoralExternalProbeDown
          expr: up{job="coral-blackbox-http"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "외부 관측점 coral 다운"
            description: "coral-1 blackbox-exporter 2분 이상 응답 없음. 외부 경로 (DNS/Cloudflare/ingress) 시야 손실. host 점검 필요."

        - alert: CoralHighTemp
          # i.MX8MQ는 hwmon 미사용 → thermal_zone 메트릭으로 노출 (type=cpu-thermal)
          expr: node_thermal_zone_temp{instance="coral-1",type="cpu-thermal"} > 75
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Coral CPU 온도 {{ $value }}°C"
            description: "coral-1 CPU 온도 5분 이상 75°C 초과. i.MX8MQ thermal throttle 임박."

        - alert: CoralLoadHigh
          expr: node_load5{instance="coral-1"} > 4
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Coral 부하 {{ $value | printf \"%.1f\" }}"
            description: "coral-1 5분 평균 load가 10분 이상 4 초과 (4-core 포화)."
