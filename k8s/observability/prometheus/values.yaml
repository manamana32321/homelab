# K3s는 controller-manager, scheduler, proxy가 k3s server에 내장되어
# 별도 metrics endpoint를 노출하지 않음 → 스크랩/rule 비활성화
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false

prometheus-node-exporter:
  dnsPolicy: Default

grafana:
  enabled: false

alertmanager:
  alertmanagerSpec:
    nodeSelector:
      kubernetes.io/hostname: json-server-1
    secrets:
      - alertmanager-telegram
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: telegram
      group_by: [alertname, namespace]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        # kube-prometheus-stack 기본 watchdog alert 무시
        - match:
            alertname: Watchdog
          receiver: "null"
        - match:
            alertname: InfoInhibitor
          receiver: "null"
    receivers:
      - name: "null"
      - name: telegram
        telegram_configs:
          - bot_token_file: /etc/alertmanager/secrets/alertmanager-telegram/bot-token
            chat_id: -1003865568684
            message_thread_id: 206
            api_url: https://api.telegram.org
            parse_mode: HTML
            message: |-
              {{ if eq .Status "firing" }}🔴{{ else }}🟢{{ end }} <b>[K8s] {{ .Status | toUpper }}</b>
              {{ range .Alerts }}
              <b>{{ .Labels.alertname }}</b> ({{ .Labels.severity }})
              {{ .Annotations.summary }}
              {{ .Annotations.description }}
              {{ end }}

prometheus:
  prometheusSpec:
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn-ssd
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
    nodeSelector:
      kubernetes.io/hostname: json-server-1
    additionalScrapeConfigs:
      # Coral Dev Board Blackbox Exporter (외부 네트워크 경로 확인용, 대표 1개만)
      - job_name: coral-blackbox-http
        metrics_path: /probe
        params:
          module: [http_2xx]
        static_configs:
          - targets:
              - https://argocd.json-server.win
            labels:
              source: coral
        relabel_configs:
          - source_labels: [__address__]
            target_label: __param_target
          - source_labels: [__param_target]
            target_label: instance
          - target_label: __address__
            replacement: 192.168.0.44:9115

      # Coral Dev Board host metrics (CPU/load/temp/memory). K3s 외부 노드라 직접 scrape
      - job_name: coral-node
        static_configs:
          - targets: [192.168.0.44:9100]
            labels:
              source: coral
              instance: coral-1

  ingress:
    enabled: true
    hosts:
      - prometheus.json-server.win
    paths:
      - /
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-dns01
      traefik.ingress.kubernetes.io/redirect-entry-point: https
    ingressClassName: traefik
    tls:
      - hosts:
          - prometheus.json-server.win
        secretName: prometheus-tls
