apiVersion: v1
kind: ConfigMap
metadata:
  name: blueprint-github-source
  namespace: authentik
data:
  github-source.yaml: |
    version: 1
    metadata:
      name: "GitHub OAuth Source"
    entries:
      # GitHub username → authentik Admins 자동 매핑
      - model: authentik_sources_oauth.oauthsourcepropertymapping
        state: present
        identifiers:
          name: github-admin-group-mapping
        attrs:
          name: github-admin-group-mapping
          expression: |
            ADMIN_GITHUB_USERNAMES = ["manamana32321"]

            github_login = info.get("login", "")

            if github_login in ADMIN_GITHUB_USERNAMES:
                return ["authentik Admins"]
            return []

      - model: authentik_sources_oauth.oauthsource
        state: present
        identifiers:
          slug: github
        attrs:
          name: GitHub
          slug: github
          enabled: true
          provider_type: github
          consumer_key: !Env GITHUB_CONSUMER_KEY
          consumer_secret: !Env GITHUB_CONSUMER_SECRET
          additional_scopes: "read:org"
          authentication_flow: !Find [authentik_flows.flow, [slug, default-source-authentication]]
          enrollment_flow: !Find [authentik_flows.flow, [slug, default-source-enrollment]]
          group_property_mappings:
            - !Find [authentik_sources_oauth.oauthsourcepropertymapping, [name, github-admin-group-mapping]]

      # 로그인 페이지에 GitHub 버튼 표시
      - model: authentik_stages_identification.identificationstage
        state: present
        identifiers:
          name: default-authentication-identification
        attrs:
          sources:
            - !Find [authentik_sources_oauth.oauthsource, [slug, github]]
