apiVersion: v1
kind: ConfigMap
metadata:
  name: blueprint-forward-auth
  namespace: authentik
data:
  forward-auth.yaml: |
    version: 1
    metadata:
      name: "Forward Auth Applications"
    entries:
      # CloudBeaver
      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers:
          name: cloudbeaver-provider
        attrs:
          name: cloudbeaver-provider
          mode: forward_single
          external_host: https://db.json-server.win
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: cloudbeaver
        attrs:
          name: CloudBeaver
          slug: cloudbeaver
          meta_launch_url: https://db.json-server.win
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, cloudbeaver-provider]]
          policy_engine_mode: any

      # Longhorn
      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers:
          name: longhorn-provider
        attrs:
          name: longhorn-provider
          mode: forward_single
          external_host: https://longhorn.json-server.win
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: longhorn
        attrs:
          name: Longhorn
          slug: longhorn
          meta_launch_url: https://longhorn.json-server.win
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, longhorn-provider]]
          policy_engine_mode: any

      # Embedded Outpost (모든 forward auth provider를 포함)
      - model: authentik_outposts.outpost
        state: present
        identifiers:
          name: "authentik Embedded Outpost"
        attrs:
          name: "authentik Embedded Outpost"
          type: proxy
          providers:
            - !Find [authentik_providers_proxy.proxyprovider, [name, cloudbeaver-provider]]
            - !Find [authentik_providers_proxy.proxyprovider, [name, longhorn-provider]]
