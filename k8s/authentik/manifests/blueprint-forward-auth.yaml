apiVersion: v1
kind: ConfigMap
metadata:
  name: blueprint-forward-auth
  namespace: authentik
data:
  forward-auth.yaml: |
    version: 1
    metadata:
      name: "Forward Auth Providers"
    entries:
      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers:
          name: cloudbeaver-provider
        attrs:
          name: cloudbeaver-provider
          mode: forward_single
          external_host: https://db.json-server.win
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]

      # Expression Policy: skku-amang GitHub org л©¤лІ„л§Њ н—€мљ©
      - model: authentik_policies_expression.expressionpolicy
        state: present
        identifiers:
          name: cloudbeaver-require-skku-amang-org
        attrs:
          name: cloudbeaver-require-skku-amang-org
          expression: |
            from authentik.sources.oauth.models import UserOAuthSourceConnection

            GITHUB_SOURCE_SLUG = "github"
            REQUIRED_ORG = "skku-amang"

            connection = UserOAuthSourceConnection.objects.filter(
                user=request.user,
                source__slug=GITHUB_SOURCE_SLUG
            ).first()

            if not connection:
                ak_message("GitHub кі„м •мњјлЎњ лЎњк·ёмќён•ґм•ј н•©л‹€л‹¤.")
                return False

            try:
                orgs = requests.get(
                    "https://api.github.com/user/orgs",
                    headers={
                        "Authorization": f"token {connection.access_token}",
                        "Accept": "application/vnd.github.v3+json"
                    }
                ).json()

                if any(org["login"] == REQUIRED_ORG for org in orgs):
                    return True
            except Exception as e:
                ak_logger.warning(f"GitHub org check failed: {e}")
                return False

            ak_message(f"{REQUIRED_ORG} GitHub мЎ°м§Ѓ л©¤лІ„л§Њ м ‘к·ј к°ЂлЉҐн•©л‹€л‹¤.")
            return False

      - model: authentik_core.application
        state: present
        identifiers:
          slug: cloudbeaver
        attrs:
          name: CloudBeaver
          slug: cloudbeaver
          meta_launch_url: https://db.json-server.win
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, cloudbeaver-provider]]
          policy_engine_mode: any

      # PolicyлҐј Applicationм—ђ л°”мќёл”©
      - model: authentik_policies.policybinding
        state: present
        identifiers:
          order: 0
          target: !Find [authentik_core.application, [slug, cloudbeaver]]
          policy: !Find [authentik_policies_expression.expressionpolicy, [name, cloudbeaver-require-skku-amang-org]]
        attrs:
          enabled: true
          order: 0
          timeout: 30
          failure_result: false
          negate: false

      # Longhorn
      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers:
          name: longhorn-provider
        attrs:
          name: longhorn-provider
          mode: forward_single
          external_host: https://longhorn.json-server.win
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: longhorn
        attrs:
          name: Longhorn
          slug: longhorn
          meta_launch_url: https://longhorn.json-server.win
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, longhorn-provider]]
          policy_engine_mode: any

      # Longhorn: authentik Admins к·ёлЈ№л§Њ м ‘к·ј н—€мљ©
      - model: authentik_policies.policybinding
        state: present
        identifiers:
          order: 0
          target: !Find [authentik_core.application, [slug, longhorn]]
          group: !Find [authentik_core.group, [name, authentik Admins]]
        attrs:
          enabled: true
          order: 0
          timeout: 30
          failure_result: false
          negate: false

      # Health Hub
      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers:
          name: health-hub-provider
        attrs:
          name: health-hub-provider
          mode: forward_single
          external_host: https://health.json-server.win
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: health-hub
        attrs:
          name: Health Hub
          slug: health-hub
          meta_launch_url: https://health.json-server.win
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, health-hub-provider]]
          policy_engine_mode: any

      # Health Hub: authentik Admins к·ёлЈ№л§Њ м ‘к·ј н—€мљ©
      - model: authentik_policies.policybinding
        state: present
        identifiers:
          order: 0
          target: !Find [authentik_core.application, [slug, health-hub]]
          group: !Find [authentik_core.group, [name, authentik Admins]]
        attrs:
          enabled: true
          order: 0
          timeout: 30
          failure_result: false
          negate: false

      # Embedded Outpost (лЄЁл“  forward auth providerлҐј нЏ¬н•Ё)
      - model: authentik_outposts.outpost
        state: present
        identifiers:
          name: "authentik Embedded Outpost"
        attrs:
          name: "authentik Embedded Outpost"
          type: proxy
          config:
            authentik_host: https://auth.json-server.win
          providers:
            - !Find [authentik_providers_proxy.proxyprovider, [name, cloudbeaver-provider]]
            - !Find [authentik_providers_proxy.proxyprovider, [name, longhorn-provider]]
            - !Find [authentik_providers_proxy.proxyprovider, [name, health-hub-provider]]
