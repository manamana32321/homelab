          failure_result: false
          negate: false

      # Prometheus
      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers:
          name: prometheus-provider
        attrs:
          name: prometheus-provider
          mode: forward_single
          external_host: https://prometheus.json-server.win
