apiVersion: batch/v1
kind: CronJob
metadata:
  name: health-hub-db-backup
  namespace: health-hub
  labels:
    app: health-hub
    job-type: db-backup
spec:
  # 02:20 KST. immich(02:00) / seafile(02:40) 과 20분 간격 — 동시 IO 폭주 회피
  # (2026-07-22 인시던트: 3개 동시 실행 + CI 러너 쏠림 → node_load1 112).
  schedule: "20 17 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: health-hub
            job-type: db-backup
        spec:
          restartPolicy: Never
          containers:
            - name: db-backup
              image: alpine:3.21
              command:
                - sh
                - -c
                - |
                  set -eo pipefail
                  apk add --no-cache postgresql17-client rclone

                  # rclone config
                  mkdir -p /root/.config/rclone
                  cat > /root/.config/rclone/rclone.conf <<CONF
                  [s3]
                  type = s3
                  provider = AWS
                  access_key_id = ${AWS_ACCESS_KEY_ID}
                  secret_access_key = ${AWS_SECRET_ACCESS_KEY}
                  region = ap-northeast-2
                  location_constraint = ap-northeast-2
                  no_check_bucket = true
                  CONF

                  # pg_dump
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  DUMP_FILE="/tmp/healthhub-db-${TIMESTAMP}.sql.gz"
                  PGPASSWORD="${DB_PASSWORD}" pg_dump \
                    -h timescaledb -p 5432 -U healthhub -d healthhub \
                    --no-owner --no-privileges \
                    | gzip > "${DUMP_FILE}"

                  # Upload to S3
                  rclone copy "${DUMP_FILE}" s3:health-backup-json-server/db/ \
                    --s3-no-check-bucket

                  echo "DB backup uploaded: db/${DUMP_FILE##*/}"
              envFrom:
                - secretRef:
                    name: health-backup-credentials
              env:
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: health-hub-secret
                      key: DB_PASSWORD
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
