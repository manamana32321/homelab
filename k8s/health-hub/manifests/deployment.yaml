apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-hub
  namespace: health-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: health-hub
  template:
    metadata:
      labels:
        app: health-hub
    spec:
      containers:
        - name: health-hub
          image: ghcr.io/manamana32321/health-hub:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DB_HOST
              value: timescaledb
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: healthhub
            - name: DB_NAME
              value: healthhub
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: health-hub-secret
                  key: DB_PASSWORD
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: health-hub-secret
                  key: API_TOKEN
            - name: LISTEN_ADDR
              value: ":8080"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
        - name: mcp
          image: ghcr.io/manamana32321/health-hub:latest
          command: ["health-hub-mcp"]
          imagePullPolicy: Always
          ports:
            - name: mcp
              containerPort: 8081
          env:
            - name: DB_HOST
              value: timescaledb
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: healthhub
            - name: DB_NAME
              value: healthhub
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: health-hub-secret
                  key: DB_PASSWORD
            - name: LISTEN_ADDR
              value: ":8081"
            - name: MCP_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: health-hub-secret
                  key: MCP_AUTH_TOKEN
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
          livenessProbe:
            tcpSocket:
              port: mcp
            initialDelaySeconds: 5
            periodSeconds: 30
