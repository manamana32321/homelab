apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-hub
  namespace: health-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: health-hub
  template:
    metadata:
      labels:
        app: health-hub
    spec:
      # health-hub 이미지는 amd64-only — raspi-1(arm64) 배치 시 exec format error로
      # crashloop. 롤아웃 때 스케줄러가 raspi-1에 올려 노출됨 (#248 동일 패턴)
      nodeSelector:
        kubernetes.io/arch: amd64
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # timescaledb가 뜨고 DNS가 풀릴 때까지 대기 — 재부팅/DB 재시작 시
        # 앱이 DB 연결 실패로 Exit 1 crashloop 도는 startup ordering 문제 차단
        - name: wait-for-db
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              until nc -z timescaledb 5432; do
                echo "waiting for timescaledb:5432..."
                sleep 2
              done
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: health-hub
          image: ghcr.io/manamana32321/health-hub:latest
          imagePullPolicy: Always
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DB_HOST
              value: timescaledb
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: healthhub
            - name: DB_NAME
              value: healthhub
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: health-hub-secret
                  key: DB_PASSWORD
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: health-hub-api-token
                  key: API_TOKEN
            - name: LISTEN_ADDR
              value: ":8080"
            - name: DEFAULT_TIMEZONE
              value: Asia/Seoul
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
        - name: mcp
          image: ghcr.io/manamana32321/health-hub:latest
          command: ["health-hub-mcp"]
          imagePullPolicy: Always
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          ports:
            - name: mcp
              containerPort: 8081
          env:
            - name: DB_HOST
              value: timescaledb
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: healthhub
            - name: DB_NAME
              value: healthhub
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: health-hub-secret
                  key: DB_PASSWORD
            - name: LISTEN_ADDR
              value: ":8081"
            - name: DEFAULT_TIMEZONE
              value: Asia/Seoul
            - name: MCP_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: health-hub-secret
                  key: MCP_AUTH_TOKEN
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
          livenessProbe:
            tcpSocket:
              port: mcp
            initialDelaySeconds: 5
            periodSeconds: 30
