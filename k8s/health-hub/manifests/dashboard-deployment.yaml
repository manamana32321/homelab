apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-hub-dashboard
  namespace: health-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: health-hub-dashboard
  template:
    metadata:
      labels:
        app: health-hub-dashboard
    spec:
      containers:
        - name: dashboard
          image: ghcr.io/manamana32321/health-hub-dashboard:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: health-hub-dashboard
  namespace: health-hub
spec:
  selector:
    app: health-hub-dashboard
  ports:
    - port: 3000
      targetPort: http
      name: http
