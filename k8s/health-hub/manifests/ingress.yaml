# API — Bearer token auth (no Authentik)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: health-hub-api
  namespace: health-hub
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns01
    traefik.ingress.kubernetes.io/redirect-entry-point: https
spec:
  ingressClassName: traefik
  rules:
    - host: health.json-server.win
      http:
        paths:
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: health-hub
                port:
                  number: 8080
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: health-hub
                port:
                  number: 8080
  tls:
    - secretName: health-hub-tls
      hosts:
        - health.json-server.win
---
# Dashboard — Authentik forward auth
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: health-hub-dashboard
  namespace: health-hub
  annotations:
    traefik.ingress.kubernetes.io/redirect-entry-point: https
    traefik.ingress.kubernetes.io/router.middlewares: authentik-authentik-forwardauth@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: health.json-server.win
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: health-hub-dashboard
                port:
                  number: 3000
  tls:
    - secretName: health-hub-tls
      hosts:
        - health.json-server.win
