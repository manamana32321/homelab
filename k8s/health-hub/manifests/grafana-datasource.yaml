# Grafana datasource for HealthHub TimescaleDB.
# Deployed to observability namespace so Grafana's sidecar picks it up.
# NOTE: The password must match the DB_PASSWORD in health-hub-secret.
# USER ACTION REQUIRED: Update the password value after sealing health-hub-secret.
apiVersion: v1
kind: ConfigMap
metadata:
  name: health-hub-grafana-datasource
  namespace: observability
  labels:
    grafana_datasource: "1"
data:
  health-hub-timescaledb.yaml: |
    apiVersion: 1
    datasources:
      - name: HealthHub
        type: postgres
        url: timescaledb.health-hub.svc.cluster.local:5432
        database: healthhub
        user: healthhub
        secureJsonData:
          password: "kBXFGF9NNiLHedI5Mk27BpHP6O5QvJBH"
        jsonData:
          sslmode: disable
          maxOpenConns: 5
          maxIdleConns: 2
          connMaxLifetime: 14400
          postgresVersion: 1700
          timescaledb: true
        editable: true
