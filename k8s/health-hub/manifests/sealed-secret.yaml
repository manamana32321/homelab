---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: health-hub-secret
  namespace: health-hub
spec:
  encryptedData:
    API_TOKEN: 
    DB_PASSWORD: 
    MCP_AUTH_TOKEN: 
  template:
    metadata:
      name: health-hub-secret
      namespace: health-hub
      annotations:
        # Reflector — automation ns에서 사용 (brain-agent CronJob, brain-agent-webhook)
        # 소스 변경 시 자동 전파
        reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
        reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "automation"
        reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
        reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "automation"
