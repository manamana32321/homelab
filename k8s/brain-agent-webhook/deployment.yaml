apiVersion: apps/v1
kind: Deployment
metadata:
  name: brain-agent-webhook
  namespace: automation
  labels:
    app: brain-agent-webhook
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: brain-agent-webhook
  template:
    metadata:
      labels:
        app: brain-agent-webhook
    spec:
      containers:
        - name: webhook
          image: python:3.12-slim
          command:
            - sh
            - -c
            - |
              set -eo pipefail
              pip install --quiet --no-cache-dir \
                openai==1.109.1 \
                fastapi==0.121.2 \
                httpx==0.28.1 \
                uvicorn==0.46.0
              exec uvicorn webhook:app --app-dir /scripts --host 0.0.0.0 --port 8080
          env:
            - name: TZ
              value: "Asia/Seoul"
            - name: HEALTH_HUB_URL
              value: "https://health.json-server.win"
            # health-hub-api-token: health-hub ns에서 reflect됨
            - name: HEALTH_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: health-hub-api-token
                  key: API_TOKEN
            # alertmanager-telegram: observability ns에서 reflect됨
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: alertmanager-telegram
                  key: bot-token
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: alertmanager-telegram
                  key: chat-id
            - name: TELEGRAM_THREAD_ID
              valueFrom:
                secretKeyRef:
                  name: alertmanager-telegram
                  key: message-thread-id
            # brain-agent-tokens: automation 자체 보유
            # OPENAI = LLM consumer hub, WEBHOOK_SECRET = 본 앱 자체 발행
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: brain-agent-tokens
                  key: OPENAI_API_KEY
            - name: WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: brain-agent-tokens
                  key: WEBHOOK_SECRET
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: script
          configMap:
            name: brain-agent-webhook-script
---
apiVersion: v1
kind: Service
metadata:
  name: brain-agent-webhook
  namespace: automation
spec:
  selector:
    app: brain-agent-webhook
  ports:
    - name: http
      port: 80
      targetPort: http
