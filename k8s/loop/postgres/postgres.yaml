---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loop-postgres-data
  namespace: loop
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn-ssd
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loop-postgres
  namespace: loop
  labels:
    app: loop-postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: loop-postgres
  template:
    metadata:
      labels:
        app: loop-postgres
    spec:
      containers:
        - name: postgres
          image: timescale/timescaledb:2.17.2-pg17
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: loop
            - name: POSTGRES_USER
              value: loop
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: loop-api-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 1Gi
              cpu: 1000m
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "loop", "-d", "loop"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "loop", "-d", "loop"]
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: loop-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: loop-postgres
  namespace: loop
spec:
  selector:
    app: loop-postgres
  ports:
    - port: 5432
      targetPort: 5432
