apiVersion: apps/v1
kind: Deployment
metadata:
  name: loop-web
  namespace: loop
  labels:
    app: loop-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loop-web
  template:
    metadata:
      labels:
        app: loop-web
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: web
          image: ghcr.io/manamana32321/loop-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: WEB_PORT
              value: "3000"
            - name: API_URL
              value: http://loop-api.loop.svc.cluster.local:3001
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 512Mi
              cpu: 500m
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
