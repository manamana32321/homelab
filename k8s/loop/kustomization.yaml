apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# 2026-07-22 전면 정지. 사용 빈도가 낮은데 GHCR PAT 만료(2026-07-18)로 Image
# Updater 만 4일째 에러를 뿜고 있었다. 데이터는 PVC(loop-postgres-data)에 남는다 —
# 되살릴 때 아래 replicas 블록만 지우면 된다.
replicas:
  - name: loop-api
    count: 0
  - name: loop-web
    count: 0
  - name: loop-postgres
    count: 0

resources:
  - namespace.yaml
  - ghcr-pull-sealed-secret.yaml
  - postgres/postgres.yaml
  - api/configmap.yaml
  - api/sealed-secret.yaml
  - api/service.yaml
  - api/deployment.yaml
  - web/service.yaml
  - web/deployment.yaml
  - web/ingress.yaml
  - migrate-job.yaml
