apiVersion: apps/v1
kind: Deployment
metadata:
  name: loop-api
  namespace: loop
  labels:
    app: loop-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loop-api
  template:
    metadata:
      labels:
        app: loop-api
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/manamana32321/loop-api:latest
          imagePullPolicy: Always
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          ports:
            - containerPort: 3001
          envFrom:
            - secretRef:
                name: loop-api-secrets
            - configMapRef:
                name: loop-api-config
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 512Mi
              cpu: 500m
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 30
