apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - cronjob.yaml
  - sealedsecret-tokens.yaml

# Python script를 별도 파일로 관리 + ConfigMap 자동 생성
# (YAML에 Python 직접 embed하면 parser 혼동 위험)
configMapGenerator:
  - name: brain-agent-script
    files:
      - morning-brief.py

generatorOptions:
  # 참조 이름 안정화 — cronjob.yaml의 configMap name 참조 그대로 작동
  disableNameSuffixHash: true
