apiVersion: batch/v1
kind: CronJob
metadata:
  name: brain-agent-morning
  namespace: automation
  labels:
    app: brain-agent
    job-type: morning-brief
spec:
  # 07:30 KST = 22:30 UTC (previous day)
  schedule: "30 22 * * *"
  timeZone: "Etc/UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app: brain-agent
            job-type: morning-brief
        spec:
          restartPolicy: Never
          containers:
            - name: brain-agent
              image: python:3.12-slim
              command:
                - sh
                - -c
                - |
                  set -eo pipefail
                  pip install --quiet --no-cache-dir openai==1.109.1 httpx==0.28.1
                  python /scripts/morning-brief.py
              env:
                - name: HEALTH_HUB_URL
                  value: "https://health.json-server.win"
                - name: TZ
                  value: "Asia/Seoul"
                # CANVAS_BASE_URL은 sensitive 아님 — env value로
                - name: CANVAS_BASE_URL
                  value: "https://canvas.skku.edu"
                # health-hub-api-token: health-hub ns에서 reflect됨
                - name: HEALTH_HUB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: health-hub-api-token
                      key: API_TOKEN
                # canvas-credentials: essentia ns에서 reflect됨
                - name: CANVAS_ACCESS_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: canvas-credentials
                      key: CANVAS_ACCESS_TOKEN
                # alertmanager-telegram: observability ns에서 reflect됨
                - name: TELEGRAM_BOT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: alertmanager-telegram
                      key: bot-token
                - name: TELEGRAM_CHAT_ID
                  valueFrom:
                    secretKeyRef:
                      name: alertmanager-telegram
                      key: chat-id
                - name: TELEGRAM_THREAD_ID
                  valueFrom:
                    secretKeyRef:
                      name: alertmanager-telegram
                      key: message-thread-id
                # OPENAI_API_KEY: Reflected from shared-secrets/llm-api-keys
                # (single SOT for cross-domain LLM keys, per k8s/CLAUDE.md).
                - name: OPENAI_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: llm-api-keys
                      key: OPENAI_API_KEY
              volumeMounts:
                - name: script
                  mountPath: /scripts
                  readOnly: true
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
          volumes:
            - name: script
              configMap:
                name: brain-agent-script
                defaultMode: 0555
