apiVersion: v1
kind: ConfigMap
metadata:
  name: brain-agent-script
  namespace: automation
data:
  morning-brief.py: |
    #!/usr/bin/env python3
    """
    Brain Agent — Morning Brief (Stevens-style)

    매일 07:30 KST 실행:
      1. health-hub MCP → 어제 건강 요약 (MVP: 이것만)
      2. OpenAI gpt-4o-mini → 한국어 브리프 생성
      3. Telegram → 장수님 private thread 푸시

    v1 MVP. iCampus/Calendar/brain-growth 은 Phase 2에서 추가.
    """
    import datetime
    import json
    import os
    import sys
    import traceback
    import httpx
    from openai import OpenAI

    # --- Config ---
    KST = datetime.timezone(datetime.timedelta(hours=9))
    NOW = datetime.datetime.now(KST)
    TODAY = NOW.date()
    YESTERDAY = TODAY - datetime.timedelta(days=1)

    HEALTH_HUB_URL = os.environ.get("HEALTH_HUB_URL", "https://health.json-server.win/mcp")
    HEALTH_HUB_TOKEN = os.environ["HEALTH_HUB_TOKEN"]
    OPENAI_API_KEY = os.environ["OPENAI_API_KEY"]
    TELEGRAM_BOT_TOKEN = os.environ["TELEGRAM_BOT_TOKEN"]
    TELEGRAM_CHAT_ID = os.environ["TELEGRAM_CHAT_ID"]
    TELEGRAM_THREAD_ID = os.environ.get("TELEGRAM_THREAD_ID")
    DRY_RUN = os.environ.get("BRAIN_AGENT_DRY_RUN") == "1"

    SYSTEM_PROMPT = """너는 장수님의 개인 비서 에이전트. 매일 아침 간단한 건강 브리프를 생성한다.

    톤:
    - 짧은 단정형 한국어
    - 반말 ("~했어", "~됨")
    - 숫자 직관적으로 전달 (예: "5시간 20분 잤어")
    - 걱정이나 칭찬보다 fact 위주
    - 주의할 점 있으면 1문장으로 짧게

    출력 포맷 (마크다운):
    🌅 *Morning Brief — YYYY-MM-DD (요일)*

    *어제 건강*
    - 🛏 수면: ...
    - 👟 걸음: ...
    - ❤️ 심박 평균: ...
    - ⚖️ 체중: ...

    *오늘 한마디*
    [한 문장 요약/조언, 데이터 기반]

    패턴이 평소와 다르면 _이유_ 한 줄 덧붙여."""


    def call_mcp_tool(url: str, token: str, tool_name: str, arguments: dict) -> dict:
        """MCP-over-HTTP (Streamable HTTP transport) tool call."""
        headers = {
            "Authorization": f"Bearer {token}",
            "Content-Type": "application/json",
            "Accept": "application/json, text/event-stream",
        }

        with httpx.Client(timeout=30.0) as client:
            # 1. Initialize
            init_resp = client.post(
                url,
                headers=headers,
                json={
                    "jsonrpc": "2.0",
                    "id": 1,
                    "method": "initialize",
                    "params": {
                        "protocolVersion": "2025-06-18",
                        "capabilities": {},
                        "clientInfo": {"name": "brain-agent", "version": "1.0"},
                    },
                },
            )
            init_resp.raise_for_status()
            session_id = init_resp.headers.get("mcp-session-id")

            auth_headers = {**headers}
            if session_id:
                auth_headers["mcp-session-id"] = session_id

            # 2. initialized notification (일부 서버 필수)
            client.post(
                url,
                headers=auth_headers,
                json={
                    "jsonrpc": "2.0",
                    "method": "notifications/initialized",
                },
            )

            # 3. Call tool
            call_resp = client.post(
                url,
                headers=auth_headers,
                json={
                    "jsonrpc": "2.0",
                    "id": 2,
                    "method": "tools/call",
                    "params": {"name": tool_name, "arguments": arguments},
                },
            )
            call_resp.raise_for_status()

            # SSE response parsing
            body = call_resp.text.strip()
            if body.startswith("event:"):
                # SSE format: extract first data line
                for line in body.split("\n"):
                    if line.startswith("data: "):
                        return json.loads(line[6:])
            return call_resp.json()


    def send_telegram(text: str) -> None:
        if DRY_RUN:
            print(f"[DRY_RUN] Telegram:\n{text}\n")
            return

        payload = {
            "chat_id": TELEGRAM_CHAT_ID,
            "text": text,
            "parse_mode": "Markdown",
        }
        if TELEGRAM_THREAD_ID:
            payload["message_thread_id"] = int(TELEGRAM_THREAD_ID)

        resp = httpx.post(
            f"https://api.telegram.org/bot{TELEGRAM_BOT_TOKEN}/sendMessage",
            json=payload,
            timeout=30.0,
        )
        resp.raise_for_status()
        print(f"Telegram sent: {resp.json().get('ok')}")


    def main() -> int:
        try:
            # Step 1: health-hub MCP 호출
            print(f"Fetching health summary for {YESTERDAY}...")
            health_result = call_mcp_tool(
                HEALTH_HUB_URL,
                HEALTH_HUB_TOKEN,
                "get_daily_summary",
                {"date": YESTERDAY.isoformat(), "timezone": "Asia/Seoul"},
            )
            health_data = health_result.get("result", health_result)
            print(f"Health data received: {list(health_data.keys()) if isinstance(health_data, dict) else type(health_data)}")

            # Step 2: OpenAI 요약
            print("Generating brief with gpt-4o-mini...")
            client = OpenAI(api_key=OPENAI_API_KEY)
            completion = client.chat.completions.create(
                model="gpt-4o-mini",
                messages=[
                    {"role": "system", "content": SYSTEM_PROMPT},
                    {
                        "role": "user",
                        "content": f"어제({YESTERDAY}) 건강 데이터:\n```json\n{json.dumps(health_data, ensure_ascii=False, indent=2)}\n```\n\n오늘 날짜: {TODAY} ({['월', '화', '수', '목', '금', '토', '일'][TODAY.weekday()]}요일)",
                    },
                ],
                temperature=0.4,
                max_tokens=600,
            )
            brief = completion.choices[0].message.content

            # Step 3: Telegram
            send_telegram(brief)
            print("Done.")
            return 0

        except Exception as e:
            err = f"⚠️ brain-agent FAILED: {type(e).__name__}: {e}\n\n```\n{traceback.format_exc()[:800]}\n```"
            print(err, file=sys.stderr)
            try:
                send_telegram(err)
            except Exception:
                pass
            return 1


    if __name__ == "__main__":
        sys.exit(main())
