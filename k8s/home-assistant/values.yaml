# 2026-05-23 인시던트: json-server-1 디스크 포화 중 HA가 60초 startup 안에 못 떠
# liveness 실패 → 80분간 26회 크래시 루프 → 반복 startup IO가 디스크 포화 악순환 유발.
# 일시적으로 0으로 내림. startupProbe 추가(느린 디스크 대응) 후 1로 복구 예정.
replicaCount: 0

controller:
  type: StatefulSet

image:
  tag: "2026.2.3"

hostNetwork: false

persistence:
  enabled: true
  size: 5Gi
  storageClass: local-path
  accessMode: ReadWriteOnce

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns01
  hosts:
    - host: ha.json-server.win
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: home-assistant-tls
      hosts:
        - ha.json-server.win

configuration:
  enabled: true
  trusted_proxies:
    - 10.42.0.0/16
    - 10.43.0.0/16

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "2"
    memory: 1Gi
