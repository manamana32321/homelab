apiVersion: apps/v1
kind: Deployment
metadata:
  name: essentia-telegram-relay
  labels:
    app: essentia-telegram-relay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: essentia-telegram-relay
  template:
    metadata:
      labels:
        app: essentia-telegram-relay
    spec:
      containers:
        - name: relay
          image: ghcr.io/manamana32321/essentia-telegram-relay:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
          envFrom:
            - secretRef:
                name: essentia-telegram-relay
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
