apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# 2026-07-22 전면 정지. 사용 빈도가 낮은데 GHCR PAT 만료(2026-07-18)로 Image
# Updater 만 4일째 에러를 뿜고 있었다. 데이터는 PVC(essentia-postgres-data)와
# MinIO Tenant 에 그대로 남는다 — 되살릴 때 아래 replicas 블록만 지우면 된다.
# 주의: 매일 07:00 KST 텔레그램 다이제스트도 함께 멈춘다 (telegram-relay 앱 내부 스케줄러).
replicas:
  - name: essentia-api
    count: 0
  - name: essentia-web
    count: 0
  - name: essentia-telegram-relay
    count: 0
  - name: essentia-postgres
    count: 0

resources:
  - namespace.yaml
  - api/configmap.yaml
  - api/deployment.yaml
  - api/ingress.yaml
  - api/sealed-secret.yaml
  - api/service.yaml
  - api/image-updater-rbac.yaml
  - postgres/postgres.yaml
  - web/deployment.yaml
  - web/ingress.yaml
  - web/service.yaml
  - telegram-relay/deployment.yaml
  - telegram-relay/sealedsecret.yaml
  - telegram-relay/service.yaml
  - ghcr-pull-sealed-secret.yaml
  - canvas-credentials.yaml

# argocd-image-updater writes the resolved digest back here on each
# successful pull-metadata cycle (post homelab#131 RBAC fix). This way
# every ArgoCD sync produces the same canonical image ref instead of
# flapping between :latest and whatever digest kubelet happened to pull.
images:
  - name: ghcr.io/essentia-edu/api
    digest: sha256:1c30ed47e532f84b3a791e23a782baa45878b79a9d32d18b6712a9d39518b67a
  - name: ghcr.io/manamana32321/essentia-telegram-relay
    newTag: latest
