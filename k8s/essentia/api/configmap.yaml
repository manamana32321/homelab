apiVersion: v1
kind: ConfigMap
metadata:
  name: essentia-api-config
  namespace: essentia
data:
  NODE_ENV: production
  PORT: "4000"
  MINIO_ENDPOINT: minio-hl.essentia.svc.cluster.local
  MINIO_PORT: "9000"
  MINIO_USE_SSL: "false"
  MINIO_BUCKET: essentia
  GOOGLE_CALLBACK_URL: https://api.essentia.json-server.win/auth/google/callback
  FRONTEND_URL: https://essentia.json-server.win
  CANVAS_BASE_URL: https://canvas.skku.edu
