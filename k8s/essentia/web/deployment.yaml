apiVersion: apps/v1
kind: Deployment
metadata:
  name: essentia-web
  namespace: essentia
  labels:
    app: essentia-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: essentia-web
  template:
    metadata:
      labels:
        app: essentia-web
    spec:
      imagePullSecrets:
        - name: ghcr-essentia
      containers:
        - name: web
          image: ghcr.io/essentia-edu/web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
