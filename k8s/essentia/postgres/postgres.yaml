apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: essentia-postgres-data
  namespace: essentia
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: longhorn-ssd
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: essentia-postgres
  namespace: essentia
  labels:
    app: essentia-postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: essentia-postgres
  template:
    metadata:
      labels:
        app: essentia-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: essentia
            - name: POSTGRES_USER
              value: essentia
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: essentia-api-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 500m
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: essentia-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: essentia-postgres
  namespace: essentia
spec:
  selector:
    app: essentia-postgres
  ports:
    - port: 5432
      targetPort: 5432
