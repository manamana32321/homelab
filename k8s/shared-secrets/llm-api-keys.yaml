---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: llm-api-keys
  namespace: shared-secrets
spec:
  encryptedData:
    OPENAI_API_KEY: 
  template:
    metadata:
      name: llm-api-keys
      namespace: shared-secrets
      annotations:
        # Cross-domain LLM credentials — replicate to consumer namespaces.
        # Allowlist is explicit (no auto-broadcast) so adding a new consumer
        # is a deliberate change reviewed in a PR.
        reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
        reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "automation,gbrain"
        reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
        reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "automation,gbrain"
    type: Opaque
