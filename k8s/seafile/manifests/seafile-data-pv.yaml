apiVersion: v1
kind: PersistentVolume
metadata:
  name: seafile-data
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: hostpath-hdd
  hostPath:
    path: /mnt/immich/seafile-data
  claimRef:
    name: seafile-data
    namespace: seafile
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - json-server-1
