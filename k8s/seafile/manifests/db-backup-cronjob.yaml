apiVersion: batch/v1
kind: CronJob
metadata:
  name: seafile-db-backup
  namespace: seafile
  labels:
    app: seafile
    job-type: db-backup
spec:
  schedule: "0 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: seafile
            job-type: db-backup
        spec:
          restartPolicy: Never
          containers:
            - name: db-backup
              image: alpine:3.21
              command:
                - sh
                - -c
                - |
                  set -e
                  apk add --no-cache mariadb-client rclone

                  # rclone config
                  mkdir -p /root/.config/rclone
                  cat > /root/.config/rclone/rclone.conf <<CONF
                  [s3]
                  type = s3
                  provider = AWS
                  access_key_id = ${AWS_ACCESS_KEY_ID}
                  secret_access_key = ${AWS_SECRET_ACCESS_KEY}
                  region = ap-northeast-2
                  location_constraint = ap-northeast-2
                  no_check_bucket = true
                  CONF

                  # mysqldump (all 3 seafile databases)
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  DUMP_FILE="/tmp/seafile-db-${TIMESTAMP}.sql.gz"
                  mysqldump \
                    -h mariadb-svc -u seafile -p"${DB_PASSWORD}" \
                    --databases ccnet_db seafile_db seahub_db \
                    --single-transaction \
                    | gzip > "${DUMP_FILE}"

                  # Upload to S3
                  rclone copy "${DUMP_FILE}" s3:seafile-backup-json-server/db/ \
                    --s3-no-check-bucket

                  echo "DB backup uploaded: db/${DUMP_FILE##*/}"
              envFrom:
                - secretRef:
                    name: seafile-backup-credentials
              env:
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: seafile-secret
                      key: SEAFILE_MYSQL_DB_PASSWORD
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
