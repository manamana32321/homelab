---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: seafile-secret
  namespace: seafile
spec:
  encryptedData:
    INIT_SEAFILE_ADMIN_PASSWORD: 
    INIT_SEAFILE_MYSQL_ROOT_PASSWORD: 
    JWT_PRIVATE_KEY: 
    SEAFILE_MYSQL_DB_PASSWORD: 
  template:
    metadata:
      name: seafile-secret
      namespace: seafile
      annotations:
        reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
        reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "cloudbeaver"
        reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
        reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "cloudbeaver"
