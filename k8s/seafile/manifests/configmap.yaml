apiVersion: v1
kind: ConfigMap
metadata:
  name: seafile-env
  namespace: seafile
data:
  TIME_ZONE: "Asia/Seoul"
  SEAFILE_LOG_TO_STDOUT: "true"
  SITE_ROOT: "/"
  SEAFILE_SERVER_HOSTNAME: "files.json-server.win"
  SEAFILE_SERVER_PROTOCOL: "https"
  SEAFILE_MYSQL_DB_HOST: "mariadb-svc"
  SEAFILE_MYSQL_DB_PORT: "3306"
  SEAFILE_MYSQL_DB_USER: "seafile"
  SEAFILE_MYSQL_DB_CCNET_DB_NAME: "ccnet_db"
  SEAFILE_MYSQL_DB_SEAFILE_DB_NAME: "seafile_db"
  SEAFILE_MYSQL_DB_SEAHUB_DB_NAME: "seahub_db"
  CACHE_PROVIDER: "redis"
  REDIS_HOST: "redis-svc"
  REDIS_PORT: "6379"
  MEMCACHED_HOST: ""
  MEMCACHED_PORT: "11211"
  ENABLE_NOTIFICATION_SERVER: "false"
  NOTIFICATION_SERVER_URL: ""
  ENABLE_SEADOC: "false"
  SEADOC_SERVER_URL: ""
  ENABLE_SEAFILE_AI: "false"
  SEAFILE_AI_SERVER_URL: ""
  MD_FILE_COUNT_LIMIT: "100000"
  INIT_SEAFILE_ADMIN_EMAIL: "manamana32321@gmail.com"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: seahub-custom-config
  namespace: seafile
data:
  extra_settings.py: |
    SERVICE_URL = "https://files.json-server.win"
    FILE_SERVER_ROOT = "https://files.json-server.win/seafhttp"
