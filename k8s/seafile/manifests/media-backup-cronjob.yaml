apiVersion: batch/v1
kind: CronJob
metadata:
  name: seafile-media-backup
  namespace: seafile
  labels:
    app: seafile
    job-type: media-backup
spec:
  schedule: "0 22 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      backoffLimit: 1
      activeDeadlineSeconds: 21600
      template:
        metadata:
          labels:
            app: seafile
            job-type: media-backup
        spec:
          restartPolicy: Never
          nodeSelector:
            kubernetes.io/hostname: json-server-1
          containers:
            - name: media-backup
              image: rclone/rclone:1.69
              command:
                - sh
                - -c
                - |
                  set -eo pipefail

                  # rclone config
                  mkdir -p /root/.config/rclone
                  cat > /root/.config/rclone/rclone.conf <<CONF
                  [s3]
                  type = s3
                  provider = AWS
                  access_key_id = ${AWS_ACCESS_KEY_ID}
                  secret_access_key = ${AWS_SECRET_ACCESS_KEY}
                  region = ap-northeast-2
                  location_constraint = ap-northeast-2
                  no_check_bucket = true
                  storage_class = INTELLIGENT_TIERING
                  CONF

                  # Sync only 내 라이브러리 + 녹음 libraries to S3
                  # --s3-no-head 불필요: S3 기존 데이터 삭제 후 전부 IT 오브젝트 (HEAD $0.005/1K)
                  # ionice idle class: Seafile과 동일 디스크(Seagate 1TB) 경합 방지
                  ionice -c 3 rclone sync /seafile-data s3:seafile-backup-json-server/media/ \
                    --filter "+ seafile/seafile-data/storage/*/66a1e14f-8c91-45c8-ace8-b3c7f03ac63e/**" \
                    --filter "+ seafile/seafile-data/storage/*/32e4bb08-fc91-4ddd-992e-a6da1bb814fd/**" \
                    --filter "- **" \
                    --s3-no-check-bucket \
                    --fast-list \
                    --transfers 2 \
                    --checkers 4 \
                    --s3-upload-cutoff 100M \
                    --s3-chunk-size 50M \
                    --bwlimit 7M \
                    --retries 3 \
                    --log-level INFO \
                    --stats 60s

                  echo "Media backup sync complete"
              envFrom:
                - secretRef:
                    name: seafile-backup-credentials
              volumeMounts:
                - name: seafile-data
                  mountPath: /seafile-data
                  readOnly: true
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 512Mi
          volumes:
            - name: seafile-data
              persistentVolumeClaim:
                claimName: seafile-data
