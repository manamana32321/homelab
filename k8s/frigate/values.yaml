image:
  tag: 0.14.1-tensorrt

nodeSelector:
  kubernetes.io/hostname: json-server-1

gpu:
  nvidia:
    enabled: true

config: |
  mqtt:
    enabled: false

  model:
    path: /config/model_cache/tensorrt/yolov7-320.trt
    input_tensor: nchw
    input_pixel_format: rgb
    width: 320
    height: 320

  detectors:
    tensorrt:
      type: tensorrt
      device: 0

  ffmpeg:
    hwaccel_args: []

  cameras:
    webcam:
      enabled: true
      ffmpeg:
        inputs:
          - path: rtsp://go2rtc.frigate.svc.cluster.local:8554/webcam
            roles:
              - detect
      detect:
        width: 640
        height: 480
        fps: 5
      objects:
        track:
          - person
      record:
        enabled: false
      snapshots:
        enabled: true
        retain:
          default: 7

shmSize: 256Mi

tmpfs:
  enabled: true
  sizeLimit: 256Mi

persistence:
  config:
    enabled: true
    size: 1Gi
    accessMode: ReadWriteOnce
  media:
    enabled: true
    size: 10Gi
    accessMode: ReadWriteOnce

ingress:
  enabled: true
  ingressClassName: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns01
    traefik.ingress.kubernetes.io/service.serversscheme: https
  hosts:
    - host: frigate.json-server.win
      paths:
        - path: /
          portName: http-auth
  tls:
    - secretName: frigate-tls
      hosts:
        - frigate.json-server.win

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "4"
    memory: 2Gi
    nvidia.com/gpu: "1"

probes:
  liveness:
    enabled: false
  readiness:
    enabled: false
  startup:
    enabled: false
