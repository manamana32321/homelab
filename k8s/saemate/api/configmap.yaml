apiVersion: v1
kind: ConfigMap
metadata:
  name: saemate-api-config
  namespace: saemate
data:
  NODE_ENV: production
  PORT: "4000"
  MINIO_ENDPOINT: minio-hl.saemate.svc.cluster.local
  MINIO_PORT: "9000"
  MINIO_USE_SSL: "false"
  MINIO_BUCKET: saemate
  GOOGLE_CALLBACK_URL: https://api.saemate.json-server.win/auth/google/callback
  FRONTEND_URL: https://saemate.json-server.win
