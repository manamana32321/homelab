apiVersion: apps/v1
kind: Deployment
metadata:
  name: saemate-api
  namespace: saemate
  labels:
    app: saemate-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: saemate-api
  template:
    metadata:
      labels:
        app: saemate-api
    spec:
      imagePullSecrets:
        - name: ghcr-saemate
      containers:
        - name: api
          image: ghcr.io/saemate/api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: saemate-api-secrets
            - configMapRef:
                name: saemate-api-config
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
