apiVersion: apps/v1
kind: Deployment
metadata:
  name: saemate-web
  namespace: saemate
  labels:
    app: saemate-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: saemate-web
  template:
    metadata:
      labels:
        app: saemate-web
    spec:
      imagePullSecrets:
        - name: ghcr-saemate
      containers:
        - name: web
          image: ghcr.io/saemate/web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
