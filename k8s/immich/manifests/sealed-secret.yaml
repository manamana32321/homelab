apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: postgres-credentials
  namespace: immich
spec:
  encryptedData:
    POSTGRES_DB: 
    POSTGRES_PASSWORD: 
    POSTGRES_USER: 
  template:
    metadata:
      name: postgres-credentials
      namespace: immich
      annotations:
        reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
        reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "cloudbeaver"
        reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
        reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "cloudbeaver"
