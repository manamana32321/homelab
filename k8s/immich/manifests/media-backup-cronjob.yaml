apiVersion: batch/v1
kind: CronJob
metadata:
  name: immich-media-backup
  labels:
    app: immich
    job-type: media-backup
spec:
  schedule: "0 18 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      backoffLimit: 1
      activeDeadlineSeconds: 21600
      template:
        metadata:
          labels:
            app: immich
            job-type: media-backup
        spec:
          restartPolicy: Never
          nodeSelector:
            kubernetes.io/hostname: json-server-1
          containers:
            - name: media-backup
              image: rclone/rclone:1.68
              command:
                - sh
                - -c
                - |
                  set -eo pipefail

                  # rclone config
                  mkdir -p /root/.config/rclone
                  cat > /root/.config/rclone/rclone.conf <<CONF
                  [s3]
                  type = s3
                  provider = AWS
                  access_key_id = ${AWS_ACCESS_KEY_ID}
                  secret_access_key = ${AWS_SECRET_ACCESS_KEY}
                  region = ap-northeast-2
                  location_constraint = ap-northeast-2
                  no_check_bucket = true
                  storage_class = INTELLIGENT_TIERING
                  CONF

                  # Sync library to S3
                  # ionice idle class: Seafile과 동일 디스크(Seagate 1TB) 경합 방지
                  # --size-only: 객체별 HEAD(mtime metadata read) 생략. 사진/영상은
                  # immutable이라 size 일치 = 동일 파일. 빠진 경우 GIR-tier HEAD가
                  # 객체수 × sync 횟수만큼 청구되어 월 $23 수준 폭발 (cf. PR #185 조사)
                  ionice -c 3 rclone sync /library s3:immich-backup-json-server/media/ \
                    --size-only \
                    --s3-no-head \
                    --s3-no-check-bucket \
                    --fast-list \
                    --transfers 2 \
                    --checkers 4 \
                    --s3-upload-cutoff 100M \
                    --s3-chunk-size 50M \
                    --bwlimit 7M \
                    --retries 3 \
                    --log-level INFO \
                    --stats 60s

                  echo "Media backup sync complete"
              envFrom:
                - secretRef:
                    name: immich-backup-credentials
              volumeMounts:
                - name: library
                  mountPath: /library
                  readOnly: true
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 512Mi
          volumes:
            - name: library
              persistentVolumeClaim:
                claimName: immich-library
