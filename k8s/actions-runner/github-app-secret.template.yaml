# GitHub App 시크릿 템플릿 — kubeseal로 암호화 후 사용
#
# 1. GitHub App 생성: https://github.com/organizations/mortonCareer/settings/apps
#    - 권한: Actions (read), Administration (read/write), Metadata (read)
#    - 설치: mortonCareer/morton 레포에 설치
# 2. App ID, Installation ID, Private Key 확보
# 3. 아래 시크릿 생성 후 kubeseal:
#    kubectl create secret generic github-app-secret \
#      --namespace=actions-runner \
#      --from-literal=github_app_id=<APP_ID> \
#      --from-literal=github_app_installation_id=<INSTALLATION_ID> \
#      --from-literal=github_app_private_key="$(cat private-key.pem)" \
#      --dry-run=client -o yaml | kubeseal --format yaml > github-app-sealed-secret.yaml
