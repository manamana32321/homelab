# ARC Runner Scale Set — bconnect CI + kiscon-sync 러너
# GitHub Actions 유료분 소진 대응으로 CI 를 self-hosted 로 회귀 (CEO 제안).
# self-hosted 러너는 hosted 분 quota/spending-limit 대상이 아니라 청구 막혀도 계속 돎.
# githubConfigUrl 은 canonical bconnect 필수 — 내부 actions/runner-registration 이 repo
# rename redirect 를 안 따라가므로 옛 morton URL 로는 fresh 등록 시 404.
# GitHub App 인증 → SealedSecret (github-app-secret).
githubConfigUrl: "https://github.com/mortonCareer/bconnect"
githubConfigSecret: github-app-secret

controllerServiceAccount:
  name: arc-controller-gha-rs-controller
  namespace: actions-runner

# dind — ci-api 가 Testcontainers(postgresql) 사용 → gradle build 시 docker daemon 필요.
# chart 가 privileged dind sidecar 주입 + runner 에 DOCKER_HOST/소켓 마운트 배선.
# k3s 는 PSP 없어 privileged 허용.
containerMode:
  type: "dind"

# scale-from-zero. maxRunners 는 amd64 노드 2대(json-server-1/2, 각 16Gi)의 실메모리
# 여유 기준 — minecraft 정지 + loki chunks-cache 비활성으로 확보 (#261).
# CI 7개 잡이 1~2 웨이브로 돎.
minRunners: 0
maxRunners: 6

template:
  spec:
    # arm64(raspi-1)는 하드 제외. control-plane(json-server-1)은 #261 에서 개방했으나,
    # 2026-07-22 인시던트에서 러너 6개가 전량 json-server-1 로 착륙 + 백업 크론 3개 동시
    # 실행이 겹쳐 node_load1 112 까지 치솟아 apiserver 응답이 지연됐다. 그 여파로
    # minio-operator 의 leader lease 갱신(15s deadline)이 두 replica 연속 실패.
    # → worker(json-server-2) 를 선호하고 control-plane 은 오버플로우 전용으로 강등.
    #   soft preference 라 #261 의 동시성 6 목표는 그대로 유지된다.
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/arch
                  operator: In
                  values:
                    - amd64
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
                - key: node-role.kubernetes.io/worker
                  operator: In
                  values:
                    - "true"
    containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:latest
        command: ["/home/runner/run.sh"]
        # next build / gradle+testcontainers 피크 대응 상향.
        resources:
          limits:
            cpu: "2"
            memory: 4Gi
          requests:
            cpu: 300m
            memory: 1Gi
