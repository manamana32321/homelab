# ARC Runner Scale Set — bconnect LIGHT 러너 (docker 불필요 잡: FE/docs/format/packages/crawler)
# BE gradle(Testcontainers) 은 dind 경합 회피 위해 morton-runner-dind 별도 셋 사용.
# githubConfigUrl은 canonical 이름(bconnect) 필수 — 내부 actions/runner-registration
# 엔드포인트는 repo rename redirect를 안 따라가므로 옛 이름(morton)으론 fresh 등록 시 404.
# GitHub App 인증 → SealedSecret으로 관리 (github-app-secret)
githubConfigUrl: "https://github.com/mortonCareer/bconnect"
githubConfigSecret: github-app-secret

controllerServiceAccount:
  name: arc-controller-gha-rs-controller
  namespace: actions-runner

# scale-from-zero: 워크플로우 대기 중일 때만 Pod 생성
minRunners: 0
maxRunners: 4

template:
  spec:
    # amd64 전용 (json-server). raspi-1(arm64) 회피 — lychee 등 도구의 arm 바이너리
    # 다운 실패→nightly fallback(docs-lint file:// 오탐) 방지.
    nodeSelector:
      kubernetes.io/arch: amd64
    containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:latest
        command: ["/home/runner/run.sh"]
        resources:
          limits:
            cpu: "2"
            memory: 4Gi
          requests:
            cpu: 250m
            memory: 512Mi
