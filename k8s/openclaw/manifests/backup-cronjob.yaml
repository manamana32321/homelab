apiVersion: batch/v1
kind: CronJob
metadata:
  name: openclaw-state-backup
  namespace: openclaw
  labels:
    app: openclaw
    job-type: state-backup
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: openclaw
            job-type: state-backup
        spec:
          restartPolicy: Never
          nodeSelector:
            kubernetes.io/hostname: json-server-1
          containers:
            - name: git-backup
              image: alpine:3.21
              command:
                - sh
                - -c
                - |
                  set -e
                  apk add --no-cache git openssh-client

                  # SSH setup
                  mkdir -p ~/.ssh
                  cp /secrets/ssh-private-key ~/.ssh/id_ed25519
                  chmod 600 ~/.ssh/id_ed25519
                  ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null

                  cd /home/node/.openclaw
                  git config --global --add safe.directory /home/node/.openclaw

                  # .gitignore (always overwrite to keep in sync)
                  cat > .gitignore <<'IGNORE'
                  *.lock
                  *.bak
                  *.bak.*
                  node_modules/
                  workspace*/
                  browser/
                  IGNORE

                  # git init (idempotent)
                  git config --global user.email "openclaw-backup@json-server.win"
                  git config --global user.name "OpenClaw Backup"
                  git config --global init.defaultBranch main
                  if [ ! -d .git ]; then
                    git init
                    git remote add origin git@github.com:manamana32321/openclaw-state.git
                  fi

                  # commit & push
                  git add -A
                  if ! git diff --cached --quiet; then
                    git commit -m "auto: $(date +%Y-%m-%d_%H:%M)"
                    git push -u origin main
                  else
                    echo "No changes to commit"
                  fi
              volumeMounts:
                - name: openclaw-home
                  mountPath: /home/node
                - name: deploy-key
                  mountPath: /secrets
                  readOnly: true
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 200m
                  memory: 512Mi
          volumes:
            - name: openclaw-home
              persistentVolumeClaim:
                claimName: openclaw-home
            - name: deploy-key
              secret:
                secretName: openclaw-backup-key
                defaultMode: 0400
