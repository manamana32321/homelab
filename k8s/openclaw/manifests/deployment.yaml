apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      nodeSelector:
        kubernetes.io/hostname: json-server-1
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: setup-config
          image: busybox
          env:
            - name: ANTHROPIC_SETUP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secret
                  key: ANTHROPIC_SETUP_TOKEN
          command:
            - sh
            - -c
            - |
              mkdir -p /home/node/.openclaw
              echo "Syncing config from ConfigMap (source of truth)"
              cp /config/openclaw.json /home/node/.openclaw/openclaw.json
              mkdir -p /home/node/.openclaw/agents/main/agent
              cat > /home/node/.openclaw/agents/main/agent/auth-profiles.json <<EOF
              {
                "version": 1,
                "profiles": {
                  "anthropic:default": {
                    "type": "token",
                    "provider": "anthropic",
                    "token": "${ANTHROPIC_SETUP_TOKEN}"
                  }
                },
                "order": {
                  "anthropic": ["anthropic:default"]
                }
              }
              EOF
              chmod 600 /home/node/.openclaw/agents/main/agent/auth-profiles.json
              find /home/node/.openclaw -name "*.lock" -delete 2>/dev/null || true
              chown -R 1000:1000 /home/node/.openclaw
          volumeMounts:
            - name: openclaw-home
              mountPath: /home/node
            - name: openclaw-config
              mountPath: /config
        - name: install-browser
          image: ghcr.io/openclaw/openclaw:latest
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              if ! ls /home/node/.cache/ms-playwright/chromium-* >/dev/null 2>&1; then
                echo "Installing Chromium via Playwright..."
                npx playwright-core install --with-deps chromium
                chown -R 1000:1000 /home/node/.cache
              else
                echo "Chromium already installed, skipping."
              fi
          env:
            - name: PLAYWRIGHT_BROWSERS_PATH
              value: /home/node/.cache/ms-playwright
          volumeMounts:
            - name: openclaw-home
              mountPath: /home/node
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest
          command: ["node", "openclaw.mjs", "gateway", "--allow-unconfigured", "--bind", "lan"]
          envFrom:
            - configMapRef:
                name: openclaw-env
            - secretRef:
                name: openclaw-secret
          ports:
            - name: gateway
              containerPort: 18789
            - name: bridge
              containerPort: 18790
          volumeMounts:
            - name: openclaw-home
              mountPath: /home/node
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: openclaw-home
          persistentVolumeClaim:
            claimName: openclaw-home
        - name: openclaw-config
          configMap:
            name: openclaw-config
