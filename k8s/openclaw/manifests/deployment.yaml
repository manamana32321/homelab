apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      nodeSelector:
        kubernetes.io/hostname: json-server-1
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: setup-workspace-study
          image: python:3.13-slim
          command: ["sh", "-c"]
          args:
            - |
              set -e
              WORKSPACE=/home/node/.openclaw/workspace-study
              MARKER="$WORKSPACE/.installed"
              apt-get update -qq && apt-get install -y -qq git ffmpeg > /dev/null 2>&1
              if [ ! -d "$WORKSPACE/.git" ]; then
                echo "Cloning opencampus repo..."
                git clone https://github.com/manamana32321/opencampus.git "$WORKSPACE"
              else
                echo "Updating opencampus repo..."
                cd "$WORKSPACE" && git pull --ff-only || true
              fi
              if [ ! -f "$MARKER" ] || [ "$WORKSPACE/requirements.txt" -nt "$MARKER" ]; then
                echo "Installing Python dependencies..."
                pip install --target="$WORKSPACE/.pylibs" -r "$WORKSPACE/requirements.txt" -q
                touch "$MARKER"
              fi
              chown -R 1000:1000 "$WORKSPACE"
              echo "Workspace ready."
          volumeMounts:
            - name: openclaw-home
              mountPath: /home/node
        - name: setup-gogcli
          image: alpine:3.21
          command: ["sh", "-c"]
          args:
            - |
              set -e
              BINARY_PATH=/home/node/.local/bin/gog
              if [ ! -f "$BINARY_PATH" ]; then
                echo "Downloading gogcli v0.11.0..."
                mkdir -p /home/node/.local/bin
                wget -qO- https://github.com/steipete/gogcli/releases/download/v0.11.0/gogcli_0.11.0_linux_amd64.tar.gz | tar xz -C /tmp
                mv /tmp/gog "$BINARY_PATH"
                chmod +x "$BINARY_PATH"
                echo "gogcli installed."
              else
                echo "gogcli already installed."
              fi
              # Register client_secret.json if available and not yet configured
              if [ -f /secrets/gog/client_secret.json ] && [ ! -f /home/node/.config/gogcli/config.json ]; then
                echo "Registering Google OAuth credentials..."
                export HOME=/home/node
                export PATH="/home/node/.local/bin:$PATH"
                gog auth credentials /secrets/gog/client_secret.json
                echo "Credentials registered."
              fi
          env:
            - name: GOG_KEYRING_BACKEND
              value: file
            - name: GOG_KEYRING_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gog-secret
                  key: GOG_KEYRING_PASSWORD
                  optional: true
          volumeMounts:
            - name: openclaw-home
              mountPath: /home/node
            - name: gog-client-secret
              mountPath: /secrets/gog
              readOnly: true
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest
          command: ["node", "openclaw.mjs", "gateway", "--allow-unconfigured", "--bind", "lan"]
          envFrom:
            - configMapRef:
                name: openclaw-env
            - secretRef:
                name: openclaw-secret
          env:
            - name: PATH
              value: /home/node/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            - name: GOG_KEYRING_BACKEND
              value: file
            - name: GOG_KEYRING_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gog-secret
                  key: GOG_KEYRING_PASSWORD
                  optional: true
          ports:
            - name: gateway
              containerPort: 18789
            - name: bridge
              containerPort: 18790
          volumeMounts:
            - name: openclaw-home
              mountPath: /home/node
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: openclaw-home
          persistentVolumeClaim:
            claimName: openclaw-home
        - name: gog-client-secret
          secret:
            secretName: gog-client-secret
            optional: true
