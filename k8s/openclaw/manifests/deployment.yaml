apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      serviceAccountName: jarvis
      nodeSelector:
        kubernetes.io/hostname: json-server-1
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: setup-gws
          image: alpine:3.21
          command: ["sh", "-c"]
          args:
            - |
              set -e
              GWS_DIR=/home/node/.config/gws
              mkdir -p "$GWS_DIR"
              # Copy credentials from Secret mount
              if [ -f /secrets/gws/client_secret.json ]; then
                cp /secrets/gws/client_secret.json "$GWS_DIR/client_secret.json"
                cp /secrets/gws/credentials.enc "$GWS_DIR/credentials.enc"
                cp /secrets/gws/encryption_key "$GWS_DIR/.encryption_key"
                chmod 600 "$GWS_DIR/.encryption_key" "$GWS_DIR/credentials.enc"
                chown -R 1000:1000 "$GWS_DIR"
                echo "Google Workspace CLI credentials configured."
              else
                echo "Warning: gws credentials not found, skipping."
              fi
          volumeMounts:
            - name: openclaw-home
              mountPath: /home/node
            - name: gws-credentials
              mountPath: /secrets/gws
              readOnly: true
      containers:
        - name: openclaw
          image: ghcr.io/manamana32321/openclaw:latest
          command: ["node", "openclaw.mjs", "gateway", "--allow-unconfigured", "--bind", "lan"]
          envFrom:
            - configMapRef:
                name: openclaw-env
            - secretRef:
                name: openclaw-secret
          env:
            - name: PATH
              value: /home/node/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            - name: GOOGLE_WORKSPACE_CLI_KEYRING_BACKEND
              value: file
          ports:
            - name: gateway
              containerPort: 18789
            - name: bridge
              containerPort: 18790
          volumeMounts:
            - name: openclaw-home
              mountPath: /home/node
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
      volumes:
        - name: openclaw-home
          persistentVolumeClaim:
            claimName: openclaw-home
        - name: gws-credentials
          secret:
            secretName: gws-credentials
            optional: true
