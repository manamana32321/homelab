apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      nodeSelector:
        kubernetes.io/hostname: json-server-1
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest
          command: ["node", "openclaw.mjs", "gateway", "--allow-unconfigured", "--bind", "lan"]
          envFrom:
            - configMapRef:
                name: openclaw-env
            - secretRef:
                name: openclaw-secret
          ports:
            - name: gateway
              containerPort: 18789
            - name: bridge
              containerPort: 18790
          volumeMounts:
            - name: openclaw-home
              mountPath: /home/node
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
        - name: gcal-mcp
          image: ghcr.io/manamana32321/gcal-mcp:latest
          env:
            - name: GOOGLE_SA_KEY_FILE
              value: /secrets/gcal/sa-key.json
            - name: GOOGLE_CALENDAR_ID
              value: manamana32321@gmail.com
          ports:
            - name: gcal-mcp
              containerPort: 3000
          volumeMounts:
            - name: gcal-sa-key
              mountPath: /secrets/gcal
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: openclaw-home
          persistentVolumeClaim:
            claimName: openclaw-home
        - name: gcal-sa-key
          secret:
            secretName: gcal-sa-key
