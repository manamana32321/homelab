apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-env
  namespace: openclaw
data:
  NODE_ENV: production
  NODE_OPTIONS: --max-old-space-size=1536
  PLAYWRIGHT_BROWSERS_PATH: /home/node/.cache/ms-playwright
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: openclaw
data:
  openclaw.json: |
    {
      "gateway": {
        "controlUi": {
          "allowedOrigins": ["https://claw.json-server.win"]
        }
      },
      "browser": {
        "enabled": true
      },
      "channels": {
        "telegram": {
          "enabled": true,
          "groupPolicy": "open"
        },
        "discord": {
          "enabled": false
        },
        "slack": {
          "enabled": true
        }
      },
      "messages": {
        "tts": {
          "auto": "inbound",
          "provider": "openai",
          "openai": {
            "model": "gpt-4o-mini-tts",
            "voice": "alloy"
          },
          "maxTextLength": 4000,
          "timeoutMs": 30000
        }
      },
      "tools": {
        "media": {
          "audio": {
            "enabled": true,
            "maxBytes": 20971520,
            "models": [
              {
                "provider": "openai",
                "model": "gpt-4o-mini-transcribe"
              }
            ]
          }
        }
      }
    }
