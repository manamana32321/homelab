apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-env
  namespace: openclaw
data:
  NODE_ENV: production
  NODE_OPTIONS: --max-old-space-size=1536
  PLAYWRIGHT_BROWSERS_PATH: /home/node/.cache/ms-playwright
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: openclaw
data:
  openclaw.json: |
    {
      "gateway": {
        "controlUi": {
          "allowedOrigins": ["https://claw.json-server.win"]
        }
      },
      "browser": {
        "enabled": true
      },
      "channels": {
        "telegram": {
          "enabled": true,
          "groupPolicy": "open",
          "groups": {
            "-1003715312880": {
              "requireMention": false
            }
          },
          "accounts": {
            "default": {},
            "jarvis": {
              "botToken": "${TELEGRAM_BOT_TOKEN_JARVIS}",
              "dmPolicy": "allowlist",
              "allowFrom": ["8126749721"]
            }
          }
        },
        "discord": {
          "enabled": false
        },
        "slack": {
          "enabled": true,
          "groupPolicy": "open",
          "requireMention": false
        }
      },
      "messages": {
        "tts": {
          "auto": "inbound",
          "provider": "openai",
          "openai": {
            "model": "gpt-4o-mini-tts",
            "voice": "alloy"
          },
          "maxTextLength": 4000,
          "timeoutMs": 30000
        }
      },
      "tools": {
        "media": {
          "audio": {
            "enabled": true,
            "maxBytes": 20971520,
            "models": [
              {
                "provider": "openai",
                "model": "gpt-4o-mini-transcribe"
              }
            ]
          }
        }
      },
      "agents": {
        "list": [
          {
            "id": "main",
            "name": "래미",
            "default": true,
            "groupChat": {
              "mentionPatterns": ["@Morton_Claw_bot", "래미", "래미야"]
            }
          },
          {
            "id": "jarvis",
            "name": "자비스",
            "workspace": "~/.openclaw/workspace-jarvis",
            "model": "anthropic/claude-opus-4-6",
            "groupChat": {
              "mentionPatterns": ["자비스", "자비스야"]
            }
          }
        ]
      },
      "bindings": [
        {
          "agentId": "main",
          "match": {
            "channel": "telegram",
            "accountId": "default"
          }
        },
        {
          "agentId": "main",
          "match": {
            "channel": "slack"
          }
        },
        {
          "agentId": "jarvis",
          "match": {
            "channel": "telegram",
            "accountId": "jarvis"
          }
        }
      ]
    }
