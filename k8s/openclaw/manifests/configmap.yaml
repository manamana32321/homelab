apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-env
  namespace: openclaw
data:
  NODE_ENV: production
  NODE_OPTIONS: --max-old-space-size=1536 --dns-result-order=ipv4first --no-network-family-autoselection
  PLAYWRIGHT_BROWSERS_PATH: /home/node/.cache/ms-playwright
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: openclaw
data:
  openclaw.json: |
    {
      "gateway": {
        "controlUi": {
          "allowedOrigins": ["https://claw.json-server.win"]
        }
      },
      "browser": {
        "enabled": true
      },
      "channels": {
        "telegram": {
          "enabled": true,
          "groupPolicy": "open",
          "groups": {
            "-1003715312880": {
              "requireMention": false
            }
          },
          "accounts": {
            "default": {},
            "jarvis": {
              "botToken": "${TELEGRAM_BOT_TOKEN_JARVIS}",
              "dmPolicy": "allowlist",
              "allowFrom": ["8126749721"]
            },
            "study": {
              "botToken": "${TELEGRAM_BOT_TOKEN_STUDY}",
              "dmPolicy": "allowlist",
              "allowFrom": ["8126749721"],
              "groupPolicy": "allowlist",
              "groupAllowFrom": ["8126749721"],
              "streaming": "partial"
            }
          }
        },
        "discord": {
          "enabled": false
        },
        "slack": {
          "enabled": true,
          "groupPolicy": "open",
          "requireMention": false
        }
      },
      "messages": {
        "tts": {
          "auto": "inbound",
          "provider": "edge",
          "edge": {
            "voice": "ko-KR-SunHiNeural",
            "lang": "ko-KR",
            "outputFormat": "audio-24khz-48kbitrate-mono-mp3"
          },
          "maxTextLength": 4000,
          "timeoutMs": 30000
        }
      },
      "agents": {
        "list": [
          {
            "id": "main",
            "name": "래미",
            "default": true,
            "groupChat": {
              "mentionPatterns": ["@Morton_Claw_bot", "래미", "래미야"]
            }
          },
          {
            "id": "jarvis",
            "name": "자비스",
            "workspace": "~/.openclaw/workspace-jarvis",
            "model": "anthropic/claude-opus-4-6",
            "groupChat": {
              "mentionPatterns": ["자비스", "자비스야"]
            }
          }
        ]
      },
      "bindings": [
        {
          "agentId": "main",
          "match": {
            "channel": "telegram",
            "accountId": "default"
          }
        },
        {
          "agentId": "main",
          "match": {
            "channel": "slack"
          }
        },
        {
          "agentId": "jarvis",
          "match": {
            "channel": "telegram",
            "accountId": "jarvis"
          }
        }
      ]
    }
