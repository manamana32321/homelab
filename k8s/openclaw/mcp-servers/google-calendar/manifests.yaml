apiVersion: v1
kind: ConfigMap
metadata:
  name: google-calendar-mcp
  namespace: openclaw
data:
  index.mjs: |
    #!/usr/bin/env node
    import { Server } from "@modelcontextprotocol/sdk/server/index.js";
    import { StdioServerTransport } from "@modelcontextprotocol/sdk/server/stdio.js";
    import {
      CallToolRequestSchema,
      ListToolsRequestSchema,
    } from "@modelcontextprotocol/sdk/types.js";
    import { google } from "googleapis";

    const CALENDAR_ID = process.env.GOOGLE_CALENDAR_ID || "primary";
    const KEY_FILE = process.env.GOOGLE_SA_KEY_FILE;
    if (!KEY_FILE) {
      console.error("GOOGLE_SA_KEY_FILE environment variable is required");
      process.exit(1);
    }

    const auth = new google.auth.GoogleAuth({
      keyFile: KEY_FILE,
      scopes: ["https://www.googleapis.com/auth/calendar"],
    });
    const calendar = google.calendar({ version: "v3", auth });

    const server = new Server(
      { name: "google-calendar", version: "1.0.0" },
      { capabilities: { tools: {} } }
    );

    server.setRequestHandler(ListToolsRequestSchema, async () => ({
      tools: [
        {
          name: "list_events",
          description: "List upcoming calendar events.",
          inputSchema: {
            type: "object",
            properties: {
              maxResults: { type: "number", description: "Max events (default: 10)" },
              timeMin: { type: "string", description: "Start time ISO 8601 (default: now)" },
              timeMax: { type: "string", description: "End time ISO 8601 (optional)" },
              q: { type: "string", description: "Free text search (optional)" },
            },
          },
        },
        {
          name: "get_event",
          description: "Get a specific calendar event by ID.",
          inputSchema: {
            type: "object",
            properties: { eventId: { type: "string" } },
            required: ["eventId"],
          },
        },
        {
          name: "create_event",
          description: "Create a new calendar event.",
          inputSchema: {
            type: "object",
            properties: {
              summary: { type: "string", description: "Event title" },
              description: { type: "string", description: "Description (optional)" },
              startDateTime: { type: "string", description: "Start ISO 8601" },
              endDateTime: { type: "string", description: "End ISO 8601" },
              location: { type: "string", description: "Location (optional)" },
            },
            required: ["summary", "startDateTime", "endDateTime"],
          },
        },
        {
          name: "update_event",
          description: "Update an existing calendar event.",
          inputSchema: {
            type: "object",
            properties: {
              eventId: { type: "string" },
              summary: { type: "string" },
              description: { type: "string" },
              startDateTime: { type: "string" },
              endDateTime: { type: "string" },
              location: { type: "string" },
            },
            required: ["eventId"],
          },
        },
        {
          name: "delete_event",
          description: "Delete a calendar event.",
          inputSchema: {
            type: "object",
            properties: { eventId: { type: "string" } },
            required: ["eventId"],
          },
        },
      ],
    }));

    server.setRequestHandler(CallToolRequestSchema, async (request) => {
      const { name, arguments: args } = request.params;
      try {
        switch (name) {
          case "list_events": {
            const res = await calendar.events.list({
              calendarId: CALENDAR_ID,
              timeMin: args.timeMin || new Date().toISOString(),
              timeMax: args.timeMax,
              maxResults: args.maxResults || 10,
              singleEvents: true,
              orderBy: "startTime",
              q: args.q,
            });
            const events = (res.data.items || []).map((e) => ({
              id: e.id, summary: e.summary,
              start: e.start?.dateTime || e.start?.date,
              end: e.end?.dateTime || e.end?.date,
              location: e.location, description: e.description,
              htmlLink: e.htmlLink,
            }));
            return { content: [{ type: "text", text: JSON.stringify(events, null, 2) }] };
          }
          case "get_event": {
            const res = await calendar.events.get({ calendarId: CALENDAR_ID, eventId: args.eventId });
            return { content: [{ type: "text", text: JSON.stringify(res.data, null, 2) }] };
          }
          case "create_event": {
            const res = await calendar.events.insert({
              calendarId: CALENDAR_ID,
              requestBody: {
                summary: args.summary, description: args.description,
                location: args.location,
                start: { dateTime: args.startDateTime },
                end: { dateTime: args.endDateTime },
              },
            });
            return { content: [{ type: "text", text: `Created: ${res.data.summary} (${res.data.htmlLink})` }] };
          }
          case "update_event": {
            const existing = await calendar.events.get({ calendarId: CALENDAR_ID, eventId: args.eventId });
            const body = { ...existing.data };
            if (args.summary) body.summary = args.summary;
            if (args.description) body.description = args.description;
            if (args.location) body.location = args.location;
            if (args.startDateTime) body.start = { dateTime: args.startDateTime };
            if (args.endDateTime) body.end = { dateTime: args.endDateTime };
            const res = await calendar.events.update({ calendarId: CALENDAR_ID, eventId: args.eventId, requestBody: body });
            return { content: [{ type: "text", text: `Updated: ${res.data.summary}` }] };
          }
          case "delete_event": {
            await calendar.events.delete({ calendarId: CALENDAR_ID, eventId: args.eventId });
            return { content: [{ type: "text", text: `Deleted event ${args.eventId}` }] };
          }
          default:
            return { content: [{ type: "text", text: `Unknown tool: ${name}` }], isError: true };
        }
      } catch (error) {
        return { content: [{ type: "text", text: `Error: ${error.message}` }], isError: true };
      }
    });

    const transport = new StdioServerTransport();
    await server.connect(transport);
  package.json: |
    {
      "name": "google-calendar-mcp",
      "version": "1.0.0",
      "type": "module",
      "main": "index.mjs",
      "dependencies": {
        "@modelcontextprotocol/sdk": "^1.0.0",
        "googleapis": "^144.0.0"
      }
    }
