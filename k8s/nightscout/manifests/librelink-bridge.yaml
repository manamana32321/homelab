apiVersion: apps/v1
kind: Deployment
metadata:
  name: librelink-bridge
  namespace: nightscout
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: librelink-bridge
  template:
    metadata:
      labels:
        app: librelink-bridge
    spec:
      containers:
        - name: librelink-bridge
          image: timoschlueter/nightscout-librelink-up:latest
          env:
            - name: NIGHTSCOUT_URL
              value: http://nightscout:1337
            - name: NIGHTSCOUT_DISABLE_HTTPS
              value: "true"
            - name: LINK_UP_REGION
              value: AP
            - name: LINK_UP_TIME_INTERVAL
              value: "5"
            - name: LOG_LEVEL
              value: info
          envFrom:
            - secretRef:
                name: librelink-credentials
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
